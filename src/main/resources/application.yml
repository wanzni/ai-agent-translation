server:
  port: 7002
  servlet:
    context-path: /

# 移动端扫码可访问的主机地址（含端口），用于生成二维码链接中的回调域名
# 本机开发请改为局域网IP，如：app.base-url: http://192.168.1.10:7002

spring:
  application:
    name: translation-ai-agent
  
  # 数据源配置 - 使用H2内存数据库进行开发测试
  datasource:
    url: jdbc:mysql://localhost:3306/translation?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  # Redis配置
  data:
    redis:
      database: 2
      host: 117.72.88.11
      port: 6379
      password: susan123
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 5000ms
    
    # Elasticsearch配置
    elasticsearch:
      repositories:
        enabled: true
      uris: http://localhost:9200
  
  # Thymeleaf配置
  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html
  
  # WebSocket配置
  websocket:
    allowed-origins: "*"
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# AI服务配置
ai:
  # 通义千问（DashScope）配置（用于文本翻译）
  dashscope:
    enabled: ${ai.dashscope.enabled}
    api-key: ${ai.dashscope.api-key}
    chat:
      options:
        model: ${ai.dashscope.chat.options.model}
        temperature: ${ai.dashscope.chat.options.temperature}
  
  # 阿里云翻译配置
  aliyun:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:your-access-key-secret}
    region: cn-hangzhou
    endpoint: mt.cn-hangzhou.aliyuncs.com

# MinIO配置
minio:
  endpoint: http://117.72.88.11:9002
  bucketName: translation-dev
  secure: false
  accessKey: root
  secretKey: susan123456

# 应用配置
app:
  baseUrl: ${APP_BASE_URL:http://localhost:7002}
  # 翻译配置
  translation:
    # 支持的语言列表
    supported-languages:
      - code: zh
        name: 中文
        native-name: 中文
      - code: en
        name: 英语
        native-name: English
      - code: ja
        name: 日语
        native-name: 日本語
      - code: ko
        name: 韩语
        native-name: 한국어
      - code: fr
        name: 法语
        native-name: Français
      - code: de
        name: 德语
        native-name: Deutsch
      - code: es
        name: 西班牙语
        native-name: Español
      - code: ru
        name: 俄语
        native-name: Русский
    
    # 翻译质量评估配置
    quality:
      enabled: true
      threshold: 0.8
      dimensions:
        - accuracy
        - fluency
        - consistency
        - completeness
    
    # 缓存配置
    cache:
      enabled: true
      ttl: 3600 # 缓存时间（秒）
      max-size: 10000 # 最大缓存条目数
  
  # 文档处理配置
  document:
    # 支持的文档格式
    supported-formats:
      - pdf
      - doc
      - docx
      - xls
      - xlsx
      - ppt
      - pptx
      - txt
    
    # 文档大小限制（MB）
    max-size: 50
    
    # 处理超时时间（秒）
    timeout: 300

  # MQ开关（RocketMQ监听是否启用）
  mq:
    enabled: ${APP_MQ_ENABLED:false}

  # 会员与点数配置
  membership:
    monthly-quota: 5000
    subscribe-bonus-points: 5000
  points:
    text-deduction: 1
    document-deduction: 10

# 日志配置
logging:
  level:
    com.ai.translation: DEBUG
    cn.net.susan.ai.translation: DEBUG
    cn.net.susan.ai.translation.service.impl.DocumentTranslationServiceImpl: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.data.elasticsearch: DEBUG
    org.apache.pdfbox.pdmodel.font.FileSystemFontProvider: ERROR
    org.apache.fontbox: ERROR
    # Hibernate SQL 与参数绑定日志（覆盖不同版本的Hibernate）
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.hibernate.type.descriptor.jdbc: TRACE
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.stat: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/translation-assistant.log

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# RocketMQ配置（如本地未部署RocketMQ，发送失败将被捕获不影响下单）
rocketmq:
  name-server: 117.72.88.11:9876
  producer:
    group: translation-ai-agent-producer

# 支付配置（真实接入需填写以下参数）
pay:
  alipay:
    enabled: true
    sandbox: ${PAY_ALIPAY_SANDBOX:true}
    app-id: ${PAY_ALIPAY_APP_ID:}
    merchant-private-key: ${PAY_ALIPAY_PRIVATE_KEY:}
    alipay-public-key: ${PAY_ALIPAY_PUBLIC_KEY:}
    notify-url: ${PAY_ALIPAY_NOTIFY_URL:http://localhost:${server.port}/api/payment/notify/alipay}
  wechat:
    enabled: true
    app-id: ${PAY_WECHAT_APP_ID:}
    mchid: ${PAY_WECHAT_MCHID:}
    merchant-serial-number: ${PAY_WECHAT_SERIAL_NO:}
    api-v3-key: ${PAY_WECHAT_API_V3_KEY:}
    private-key-path: ${PAY_WECHAT_PRIVATE_KEY_PATH:}
    notify-url: ${PAY_WECHAT_NOTIFY_URL:http://localhost:${server.port}/api/payment/notify/wechat}
chat:
  sse:
    executor:
      # 线程池核心线程数
      core-pool-size: 8
      # 线程池最大线程数
      max-pool-size: 20
      # 有界队列容量，避免无界排队导致内存膨胀
      queue-capacity: 500
      # 空闲线程保活秒数
      keep-alive-seconds: 60
      # 关闭时是否等待任务完成
      wait-for-tasks-to-complete-on-shutdown: true
      # 关闭等待的最大秒数
      await-termination-seconds: 5
      # 是否允许核心线程超时
      allow-core-thread-time-out: false
      # 线程名前缀，便于日志观测
      thread-name-prefix: "chat-sse-"