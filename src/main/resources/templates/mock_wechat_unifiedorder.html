<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>微信支付 - 模拟收银台</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background:#f6f7fb; }
    .wrap { max-width: 640px; margin: 40px auto; background:#fff; border-radius:12px; box-shadow:0 6px 24px rgba(0,0,0,0.08); overflow:hidden; }
    .header { display:flex; align-items:center; gap:12px; padding:20px 24px; background:#07c160; color:#fff; }
    .logo { width:28px; height:28px; border-radius:6px; background:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; color:#07c160; }
    .content { padding:24px; }
    .order { background:#e9f8ef; border:1px solid #c9efd8; border-radius:8px; padding:16px; margin-bottom:16px; }
    .actions { display:flex; gap:12px; margin-top:12px; }
    .btn { padding:10px 16px; border:none; border-radius:8px; cursor:pointer; font-weight:600; }
    .btn-primary { background:#07c160; color:#fff; }
    .btn-danger { background:#ff4d4f; color:#fff; }
    .hint { color:#666; font-size:14px; margin-top:12px; }
    .foot { padding:16px 24px; background:#fafafa; border-top:1px solid #eee; color:#999; font-size:13px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">微</div>
    <div>
      <div style="font-size:18px; font-weight:700;">微信支付 - 模拟收银台</div>
      <div style="opacity:.9; font-size:13px;">用于开发联调，非真实支付页面</div>
    </div>
  </div>
  <div class="content">
    <div class="order">
      <div style="font-weight:700;">订单支付</div>
      <div>支付单号：<span id="paymentNo">[[${paymentNo}]]</span></div>
      <div>支付金额：<span>[[${amount}]] [[${currency}]]</span></div>
      <div>支付账号：<span>苏三</span></div>
      <div class="hint">点击下方按钮模拟支付结果，服务端会更新订单状态。</div>
      <div class="actions">
        <button class="btn btn-primary" id="btnPay">模拟支付成功</button>
        <button class="btn btn-danger" id="btnFail">模拟支付失败</button>
      </div>
    </div>
    <div id="msg" class="hint"></div>
  </div>
  <div class="foot">© Mock WeChat Pay | 本页面仅用于开发与演示</div>
</div>

<script>
  const paymentNo = document.getElementById('paymentNo').textContent;
  const msg = document.getElementById('msg');

  async function confirmSuccess() {
    try {
      const resp = await fetch('/api/payment/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentNo })
      });
      const data = await resp.json().catch(() => null);
      const payload = data && (data.data || data);
      msg.textContent = '支付成功：' + (payload && payload.orderNo ? ('订单号 ' + payload.orderNo) : '已更新');
      msg.style.color = '#07c160';
    } catch (e) {
      msg.textContent = '请求失败，请稍后重试';
      msg.style.color = '#ff4d4f';
    }
  }

  function simulateFail() {
    msg.textContent = '已模拟失败：不更新订单（保留待支付）';
    msg.style.color = '#ff4d4f';
  }

  document.getElementById('btnPay').addEventListener('click', confirmSuccess);
  document.getElementById('btnFail').addEventListener('click', simulateFail);
</script>
</body>
</html>
