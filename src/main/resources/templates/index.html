<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::page-styles}, ~{::page-scripts})}">
<head>
    <title>首页 - 智能翻译助手</title>

    <th:block th:fragment="page-styles">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            brand: {
                                50: '#eff6ff',
                                100: '#dbeafe',
                                500: '#3b82f6',
                                600: '#2563eb',
                                700: '#1d4ed8',
                            }
                        }
                    }
                }
            }
        </script>
        <style>
            [x-cloak] { display: none !important; }
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            body { overflow: hidden; }
            nav.navbar { display: none !important; }
            footer { display: none !important; }
        </style>
    </th:block>
</head>

<div th:fragment="content" class="bg-[#f4f6f8] h-screen flex overflow-hidden" x-data="translationApp()" x-cloak>

    <!-- ========== 左侧导航栏 ========== -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col h-full">
        <!-- Logo 区域 -->
        <div class="p-5 border-b border-gray-100">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-brand-500 to-brand-600 rounded-xl flex items-center justify-center shadow-sm">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-slate-800 text-lg">智能翻译助手</h1>
                    <p class="text-xs text-slate-400">AI Translation Agent</p>
                </div>
            </div>
        </div>

        <!-- 导航菜单 -->
        <nav class="flex-1 p-4 space-y-1">
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-brand-50 text-brand-600 font-medium transition-all hover:bg-brand-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                </svg>
                <span>文本翻译</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 font-medium transition-all hover:bg-slate-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span>文档翻译</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 font-medium transition-all hover:bg-slate-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <span>实时对话</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 font-medium transition-all hover:bg-slate-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
                <span>术语库</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 font-medium transition-all hover:bg-slate-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                <span>质量评估</span>
            </a>
        </nav>

        <!-- 用户信息区 -->
        <div class="p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 p-3 bg-gradient-to-r from-amber-50 to-orange-50 rounded-xl">
                <img src="/img/avatar.png" alt="avatar" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                <div class="flex-1 min-w-0">
                    <p class="font-semibold text-slate-800 text-sm truncate" th:text="${userName}">AI 用户</p>
                    <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gradient-to-r from-amber-400 to-orange-400 text-white shadow-sm">
                        SVIP 会员
                    </span>
                </div>
            </div>
        </div>
    </aside>

    <!-- ========== 中间核心翻译区 ========== -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- 顶部 Banner -->
        <div class="flex-shrink-0 bg-gradient-to-r from-cyan-50 to-blue-50 border-b border-cyan-100 px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-cyan-100 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-cyan-800">100% 在线服务</p>
                        <p class="text-xs text-cyan-600">基于 Spring AI 云端处理</p>
                    </div>
                </div>
                <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-sm">
                    <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span class="text-sm font-semibold text-slate-700">可用点数：</span>
                    <span class="text-sm font-bold text-amber-600" th:text="${points}">1,280</span>
                </div>
            </div>
        </div>

        <!-- 翻译核心内容区 -->
        <div class="flex-1 overflow-y-auto hide-scrollbar p-6">
            <!-- 翻译卡片 -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

                <!-- 语言选择控制条 -->
                <div class="flex items-center justify-between px-6 py-4 bg-gray-50 border-b border-gray-100">
                    <!-- 源语言 -->
                    <div class="flex items-center gap-2">
                        <label class="text-sm text-slate-500 font-medium">源语言</label>
                        <select x-model="sourceLang"
                                class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-slate-700 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all min-w-[140px]">
                            <option value="auto">自动检测</option>
                            <option value="zh">中文</option>
                            <option value="en">英语</option>
                            <option value="ja">日语</option>
                            <option value="ko">韩语</option>
                            <option value="fr">法语</option>
                            <option value="de">德语</option>
                            <option value="es">西班牙语</option>
                            <option value="ru">俄语</option>
                            <option value="ar">阿拉伯语</option>
                        </select>
                    </div>

                    <!-- 切换按钮 -->
                    <button @click="swapLang()"
                            class="w-12 h-12 bg-brand-600 hover:bg-brand-700 text-white rounded-full flex items-center justify-center shadow-md hover:shadow-lg transition-all duration-300 transform hover:rotate-180 active:scale-95">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                        </svg>
                    </button>

                    <!-- 目标语言 -->
                    <div class="flex items-center gap-2">
                        <label class="text-sm text-slate-500 font-medium">目标语言</label>
                        <select x-model="targetLang"
                                class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-slate-700 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all min-w-[140px]">
                            <option value="en" selected>英语</option>
                            <option value="zh">中文</option>
                            <option value="ja">日语</option>
                            <option value="ko">韩语</option>
                            <option value="fr">法语</option>
                            <option value="de">德语</option>
                            <option value="es">西班牙语</option>
                            <option value="ru">俄语</option>
                            <option value="ar">阿拉伯语</option>
                        </select>
                    </div>
                </div>

                <!-- 翻译输入输出区 -->
                <div class="grid grid-cols-2 divide-x divide-gray-100 min-h-[320px]">
                    <!-- 左侧：原文输入 -->
                    <div class="relative">
                        <textarea x-model="sourceText"
                                  @keydown.ctrl.enter.window="doTranslate()"
                                  @keydown.meta.enter.window="doTranslate()"
                                  class="w-full h-full min-h-[320px] p-6 text-slate-700 text-base leading-relaxed resize-none border-0 focus:outline-none focus:ring-0 placeholder-slate-300"
                                  placeholder="请输入要翻译的文本..."></textarea>

                        <!-- 底部操作栏 -->
                        <div class="absolute bottom-0 left-0 right-0 px-6 py-4 bg-gradient-to-t from-white via-white to-transparent">
                            <div class="flex items-center justify-between">
                                <button class="flex items-center gap-2 px-4 py-2 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition-all text-sm font-medium">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                                    </svg>
                                    <span>云端语音</span>
                                </button>
                                <button @click="doTranslate()"
                                        :disabled="isTranslating || !sourceText.trim()"
                                        class="flex items-center gap-2 px-6 py-2.5 bg-brand-600 hover:bg-brand-700 disabled:bg-brand-300 text-white rounded-xl font-medium shadow-md hover:shadow-lg transition-all disabled:cursor-not-allowed active:scale-95">
                                    <template x-if="isTranslating">
                                        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                    </template>
                                    <template x-if="!isTranslating">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                                        </svg>
                                    </template>
                                    <span x-text="isTranslating ? '翻译中...' : '在线翻译'">在线翻译</span>
                                </button>
                            </div>
                            <p class="text-xs text-slate-400 mt-2 text-center">
                                <kbd class="px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-mono">Ctrl</kbd>
                                +
                                <kbd class="px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 font-mono">Enter</kbd>
                                快捷翻译
                            </p>
                        </div>
                    </div>

                    <!-- 右侧：译文展示 -->
                    <div class="relative bg-slate-50">
                        <div class="h-full min-h-[320px] p-6">
                            <template x-if="!targetText && !isTranslating">
                                <div class="h-full flex flex-col items-center justify-center text-slate-400">
                                    <svg class="w-12 h-12 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                    </svg>
                                    <p class="text-sm">翻译结果将显示在这里</p>
                                </div>
                            </template>
                            <template x-if="isTranslating">
                                <div class="h-full flex flex-col items-center justify-center">
                                    <div class="flex items-center gap-3 text-brand-600 mb-2">
                                        <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        <span class="text-sm font-medium">AI 翻译中...</span>
                                    </div>
                                    <p class="text-xs text-slate-400">语义理解中</p>
                                </div>
                            </template>
                            <template x-if="targetText && !isTranslating">
                                <div class="h-full flex flex-col">
                                    <div x-show="targetText" class="flex-1 text-slate-700 text-base leading-relaxed whitespace-pre-wrap" x-text="targetText"></div>

                                    <!-- 辅助操作按钮 -->
                                    <div x-show="targetText" class="flex items-center gap-2 mt-4 pt-4 border-t border-slate-200 opacity-0 hover:opacity-100 transition-opacity"
                                         x-transition>
                                        <button class="flex items-center gap-1.5 px-3 py-1.5 text-sm text-slate-600 hover:text-slate-800 hover:bg-slate-200 rounded-lg transition-all">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>
                                            </svg>
                                            <span>朗读</span>
                                        </button>
                                        <button @click="navigator.clipboard.writeText(targetText)"
                                                class="flex items-center gap-1.5 px-3 py-1.5 text-sm text-slate-600 hover:text-slate-800 hover:bg-slate-200 rounded-lg transition-all">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                            </svg>
                                            <span>复制</span>
                                        </button>
                                        <button class="flex items-center gap-1.5 px-3 py-1.5 text-sm text-amber-600 hover:text-amber-700 hover:bg-amber-50 rounded-lg transition-all">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
                                            </svg>
                                            <span>AI 润色</span>
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ========== 右侧 AI Workflow 面板 ========== -->
    <aside class="w-80 bg-white border-l border-gray-200 flex flex-col h-full">
        <!-- Header -->
        <div class="flex-shrink-0 px-5 py-4 border-b border-gray-100">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-sm">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                    </svg>
                </div>
                <div>
                    <h2 class="font-semibold text-slate-800">AI Workflow Timeline</h2>
                    <p class="text-xs text-slate-400">任务执行过程追踪</p>
                </div>
            </div>
        </div>

        <!-- 状态指示器 -->
        <div class="flex-shrink-0 px-5 py-3 bg-gray-50 border-b border-gray-100">
            <div class="flex items-center gap-2">
                <template x-if="workflowStatus === 'idle'">
                    <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-600">
                        <span class="w-1.5 h-1.5 bg-slate-400 rounded-full"></span>
                        等待中
                    </span>
                </template>
                <template x-if="workflowStatus === 'processing'">
                    <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-700">
                        <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
                        处理中
                    </span>
                </template>
                <template x-if="workflowStatus === 'completed'">
                    <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                        已完成
                    </span>
                </template>
            </div>
        </div>

        <!-- 主体内容区 -->
        <div class="flex-1 overflow-y-auto hide-scrollbar p-5">

            <!-- Idle 状态 -->
            <template x-if="workflowStatus === 'idle'">
                <div class="h-full flex flex-col items-center justify-center text-center">
                    <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-4">
                        <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <p class="text-slate-500 text-sm font-medium mb-1">等待任务开始...</p>
                    <p class="text-slate-400 text-xs">输入文本并点击翻译按钮</p>
                </div>
            </template>

            <!-- Processing 状态 - 骨架屏 -->
            <template x-if="workflowStatus === 'processing'">
                <div class="space-y-4">
                    <div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl p-4 border border-blue-100">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div>
                            <span class="text-xs font-medium text-blue-700">Spring AI 接入中</span>
                        </div>
                        <div class="space-y-2">
                            <div class="h-2 bg-blue-200 rounded-full w-full animate-pulse"></div>
                            <div class="h-2 bg-blue-100 rounded-full w-3/4 animate-pulse"></div>
                        </div>
                    </div>

                    <div class="bg-gradient-to-r from-purple-50 to-pink-50 rounded-xl p-4 border border-purple-100">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-2 h-2 bg-purple-500 rounded-full animate-pulse"></div>
                            <span class="text-xs font-medium text-purple-700">语义分析中</span>
                        </div>
                        <div class="space-y-2">

<th:block th:fragment="page-scripts">
<script th:inline="none">
function translationApp() {
    return {
        sourceText: '你好，欢迎使用智能翻译助手！这是一个基于Spring AI的多语言翻译系统，支持文本翻译、文档翻译和实时对话翻译。',
        targetText: '',
        sourceLang: 'auto',
        targetLang: 'en',
        isTranslating: false,
        workflowStatus: 'idle',
        typewriterInterval: null,

        swapLang() {
            const tempLang = this.sourceLang;
            this.sourceLang = this.targetLang;
            this.targetLang = tempLang;

            const tempText = this.sourceText;
            this.sourceText = this.targetText;
            this.targetText = tempText;
        },

        async doTranslate() {
            if (!this.sourceText.trim() || this.isTranslating) return;

            this.isTranslating = true;
            this.workflowStatus = 'processing';
            this.targetText = '';

            await new Promise(resolve => setTimeout(resolve, 1000));

            const translations = {
                'en': 'Hello, welcome to the Intelligent Translation Assistant! This is a multilingual translation system based on Spring AI, supporting text translation, document translation, and real-time conversation translation.',
                'ja': 'こんにちは、お気軽にお問い合わせください！これはSpring AIに基づく多言語翻訳システムであり、テキスト翻訳、書類翻訳、リアルタイム会話翻訳をサポートしています。',
                'ko': '안녕하세요, 반갑습니다! 이것은 Spring AI 기반 다국어 번역 시스템으로, 텍스트 번역, 문서 번역, 실시간 대화 번역을 지원합니다.',
                'fr': 'Bonjour, bienvenue ! Ceci est un système de traduction multilingue basé sur Spring AI, prenant en charge la traduction de textes, de documents et de conversations en temps réel.',
                'de': 'Hallo, willkommen! Dies ist ein mehrsprachiges Übersetzungssystem auf Basis von Spring AI, das Textübersetzung, Dokumentübersetzung und Echtzeit-Unterhaltungsübersetzung unterstützt.'
            };

            const targetText = translations[this.targetLang] || translations['en'];
            let index = 0;

            this.typewriterInterval = setInterval(() => {
                if (index < targetText.length) {
                    this.targetText += targetText[index];
                    index++;
                } else {
                    clearInterval(this.typewriterInterval);
                    this.typewriterInterval = null;
                    this.isTranslating = false;
                    this.workflowStatus = 'completed';
                }
            }, 30);
        }
    }
}
</script>
