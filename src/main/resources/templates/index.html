<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::page-styles}, ~{::page-scripts})}">
<head>
    <title>首页 - 智能翻译助手</title>
    <th:block th:fragment="page-styles">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
        <style>
            [x-cloak]{display:none!important}
            body{overflow:hidden}
            nav.navbar,footer{display:none!important}
            .bg-shell{background:linear-gradient(180deg,#f4f7fb 0%,#eef3f8 100%)}
            .card{background:rgba(255,255,255,.92);border:1px solid rgba(148,163,184,.16);box-shadow:0 16px 32px rgba(15,23,42,.08);backdrop-filter:blur(10px)}
            .hide-scrollbar::-webkit-scrollbar{display:none}.hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
        </style>
    </th:block>
</head>
<div th:fragment="content" class="bg-shell h-screen flex overflow-hidden" x-data="app()" x-init="init()" x-cloak>
    <aside class="w-64 bg-slate-950 text-white px-4 py-5 flex flex-col gap-5">
        <div>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-blue-500 flex items-center justify-center font-bold">译</div>
                <div>
                    <p class="font-semibold">智能翻译工作台</p>
                    <p class="text-xs text-slate-400">统一首页入口</p>
                </div>
            </div>
        </div>
        <div class="space-y-2 text-sm">
            <button class="w-full text-left rounded-2xl px-4 py-3" :class="tab('text')" @click="setPanel('text')">文本翻译</button>
            <button class="w-full text-left rounded-2xl px-4 py-3" :class="tab('document')" @click="setPanel('document')">文档翻译</button>
            <button class="w-full text-left rounded-2xl px-4 py-3" :class="tab('chat')" @click="setPanel('chat')">客服对话</button>
            <button class="w-full text-left rounded-2xl px-4 py-3" :class="tab('term')" @click="setPanel('term')">术语库</button>
            <button class="w-full text-left rounded-2xl px-4 py-3" :class="tab('quality')" @click="setPanel('quality')">质量评估</button>
        </div>
        <div class="d-none mt-auto rounded-3xl bg-white/5 border border-white/10 p-4 text-sm">
            <p class="text-slate-300">当前用户</p>
            <p class="mt-2 font-medium" th:text="${userName}">当前用户</p>
        </div>
        <div class="mt-auto rounded-3xl bg-white/5 border border-white/10 p-4 text-sm">
            <p class="text-slate-300">账号与会员</p>
            <template x-if="loggedIn()">
                <div class="mt-3 space-y-3">
                    <div>
                        <p class="font-medium text-white" x-text="userName()"></p>
                        <p class="text-xs text-slate-400" x-text="userMeta()"></p>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <div class="rounded-2xl bg-white/5 px-3 py-2">
                            <p class="text-slate-400">会员状态</p>
                            <p class="mt-1 text-white" x-text="membershipBadgeText()"></p>
                        </div>
                        <div class="rounded-2xl bg-white/5 px-3 py-2">
                            <p class="text-slate-400">剩余点数</p>
                            <p class="mt-1 text-white" x-text="pointsText()"></p>
                        </div>
                    </div>
                    <p class="text-xs text-slate-400" x-text="membershipDetailText()"></p>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="rounded-2xl bg-blue-500 px-3 py-2 text-xs font-medium text-white" @click="openMembership()">开通会员</button>
                        <button class="rounded-2xl border border-white/10 px-3 py-2 text-xs text-slate-100" @click="openOrders()">我的订单</button>
                        <button class="rounded-2xl border border-white/10 px-3 py-2 text-xs text-slate-100" @click="openProfile()">个人资料</button>
                        <button class="rounded-2xl border border-white/10 px-3 py-2 text-xs text-slate-100" @click="logout()">退出登录</button>
                    </div>
                </div>
            </template>
            <template x-if="!loggedIn()">
                <div class="mt-3 space-y-3">
                    <p class="text-xs leading-6 text-slate-400">登录后可使用会员购买、订单查询和个人资料相关能力。</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="rounded-2xl bg-blue-500 px-3 py-2 text-xs font-medium text-white" @click="openLogin()">立即登录</button>
                        <button class="rounded-2xl border border-white/10 px-3 py-2 text-xs text-slate-100" @click="openMembership()">会员中心</button>
                    </div>
                </div>
            </template>
        </div>
    </aside>

    <main class="flex-1 px-6 py-6 overflow-hidden flex flex-col gap-6">
        <header class="card rounded-[28px] px-6 py-5">
            <div class="flex items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-semibold text-slate-900" x-text="title()"></h1>
                    <p class="mt-1 text-sm text-slate-500" x-text="headerSubtitle()"></p>
                </div>
                <div class="flex flex-wrap justify-end gap-3 text-sm">
                    <button class="rounded-xl border border-slate-200 px-3 py-2" x-show="!loggedIn()" @click="openLogin()">登录</button>
                    <button class="rounded-xl border border-slate-200 px-3 py-2" x-show="loggedIn()" @click="openProfile()">个人资料</button>
                    <button class="rounded-xl border border-slate-200 px-3 py-2" x-show="loggedIn()" @click="openOrders()">我的订单</button>
                    <button class="rounded-xl bg-blue-600 px-4 py-2 text-white" @click="openMembership()">开通会员</button>
                </div>
            </div>
        </header>

        <section class="flex-1 overflow-y-auto hide-scrollbar space-y-6">
            <section x-show="active==='text'" class="grid grid-cols-12 gap-6">
                <div class="col-span-8 card rounded-[28px] p-6 space-y-4">
                    <div class="grid grid-cols-4 gap-3 text-sm">
                        <select x-model="textForm.sourceLanguage" class="rounded-2xl border border-slate-200 px-4 py-3">
                            <template x-for="lang in languages" :key="'s-'+lang.value"><option :value="lang.value" x-text="lang.label"></option></template>
                        </select>
                        <select x-model="textForm.targetLanguage" class="rounded-2xl border border-slate-200 px-4 py-3">
                            <template x-for="lang in targetLanguages" :key="'t-'+lang.value"><option :value="lang.value" x-text="lang.label"></option></template>
                        </select>
                        <select x-model="textForm.translationEngine" class="rounded-2xl border border-slate-200 px-4 py-3">
                            <option value="">默认路由</option>
                            <template x-for="engine in engines" :key="engine"><option :value="engine" x-text="engine"></option></template>
                        </select>
                        <input x-model.trim="textForm.domain" class="rounded-2xl border border-slate-200 px-4 py-3" placeholder="领域">
                    </div>
                    <div class="flex gap-3 justify-end text-sm">
                        <button class="rounded-xl border border-slate-200 px-3 py-2" @click="detectLang()">识别语言</button>
                        <button class="rounded-xl border border-slate-200 px-3 py-2" @click="polishText()">润色译文</button>
                        <button class="rounded-xl bg-blue-600 text-white px-4 py-2" @click="startTextTask()" :disabled="textLoading">开始翻译</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4 min-h-[360px]">
                        <textarea x-model="textForm.sourceText" class="rounded-[24px] border border-slate-200 p-5 resize-none text-sm leading-7" placeholder="请输入待翻译文本"></textarea>
                        <div class="rounded-[24px] border border-slate-200 bg-slate-50 p-5 flex flex-col">
                            <div class="flex items-center justify-between text-sm text-slate-500">
                                <span x-text="getStatusLabel(textResult.status)"></span>
                                <button @click="copyText()" class="text-xs">复制</button>
                            </div>
                            <template x-if="textResult.revisionApplied">
                                <div class="mt-3 inline-flex w-fit items-center rounded-full bg-emerald-50 px-3 py-1 text-xs text-emerald-700" x-text="textResult.revisionSummary || '已自动修正规则问题'"></div>
                            </template>
                            <div class="mt-4 flex-1 whitespace-pre-wrap text-sm leading-7 text-slate-700" x-text="textResult.previewText || textResult.finalText || '翻译结果将在此处显示'"></div>
                            <div class="mt-4 grid grid-cols-2 gap-3 text-xs">
                                <div class="rounded-2xl bg-white border border-slate-200 px-3 py-2">模型：<span x-text="textResult.selectedModel || '--'"></span></div>
                                <div class="rounded-2xl bg-white border border-slate-200 px-3 py-2">需复核：<span x-text="booleanLabel(textResult.needHumanReview)"></span></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-span-4 card rounded-[28px] p-6">
                    <div class="flex items-center justify-between">
                        <p class="font-semibold text-slate-900">执行时间线</p>
                        <span class="text-xs text-slate-500" x-text="getStepTypeLabel({ stepType: textResult.currentStep })"></span>
                    </div>
                    <div class="mt-4 space-y-4 max-h-[520px] overflow-y-auto hide-scrollbar text-sm">
                        <template x-if="textTimeline.length===0"><div class="text-slate-400">暂无执行记录</div></template>
                        <template x-for="step in textTimeline" :key="step.id || step.stepNo || step.stepType">
                            <div class="border-l border-slate-200 pl-4">
                                <p class="font-medium text-slate-800" x-text="getStepTypeLabel(step)"></p>
                                <p class="mt-1 text-xs text-slate-400" x-text="getStatusLabel(step.status)"></p>
                                <p class="mt-2 text-xs leading-6 text-slate-500" x-text="stepSummary(step)"></p>
                            </div>
                        </template>
                    </div>
                </div>
            </section>

            <section x-show="active==='document'" class="grid grid-cols-12 gap-6">
                <div class="col-span-4 card rounded-[28px] p-6 space-y-4 text-sm">
                    <input type="file" @change="pickFile($event)" class="rounded-2xl border border-slate-200 px-4 py-3">
                    <div class="grid grid-cols-2 gap-3">
                        <select x-model="docForm.sourceLanguage" class="rounded-2xl border border-slate-200 px-4 py-3"><template x-for="lang in languages" :key="'ds'+lang.value"><option :value="lang.value" x-text="lang.label"></option></template></select>
                        <select x-model="docForm.targetLanguage" class="rounded-2xl border border-slate-200 px-4 py-3"><template x-for="lang in targetLanguages" :key="'dt'+lang.value"><option :value="lang.value" x-text="lang.label"></option></template></select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select x-model="docForm.translationEngine" class="rounded-2xl border border-slate-200 px-4 py-3"><template x-for="engine in engines" :key="'de'+engine"><option :value="engine" x-text="engine"></option></template></select>
                        <select x-model="docForm.translationType" class="rounded-2xl border border-slate-200 px-4 py-3"><option value="STANDARD">标准翻译</option><option value="PROFESSIONAL">专业翻译</option></select>
                    </div>
                    <button class="rounded-xl bg-blue-600 text-white px-4 py-3" @click="uploadDoc()">上传并翻译</button>
                </div>
                <div class="col-span-8 card rounded-[28px] p-6">
                    <div class="flex items-center justify-between"><p class="font-semibold text-slate-900">文档任务</p><button class="text-sm border rounded-xl px-3 py-2" @click="refreshDocs()">刷新</button></div>
                    <div class="mt-4 overflow-x-auto text-sm">
                        <table class="min-w-full"><thead class="text-slate-500"><tr><th class="py-2 text-left">文件</th><th class="py-2 text-left">状态</th><th class="py-2 text-left">进度</th><th class="py-2 text-left">操作</th></tr></thead><tbody>
                        <template x-if="docs.length===0"><tr><td colspan="4" class="py-8 text-slate-400">暂无文档任务</td></tr></template>
                        <template x-for="doc in docs" :key="doc.id"><tr class="border-t border-slate-100"><td class="py-3" x-text="doc.originalFilename || doc.id"></td><td class="py-3"><div x-text="getStatusLabel(doc.status)"></div><div class="text-xs text-slate-400" x-text="doc.statusMessage || ''"></div></td><td class="py-3" x-text="(doc.progress || 0) + '%' "></td><td class="py-3 space-x-2"><button class="text-xs border rounded px-2 py-1" @click="refreshDoc(doc,true)">进度</button><button class="text-xs border rounded px-2 py-1" @click="retryDoc(doc)">重试</button><button class="text-xs border rounded px-2 py-1" @click="openDoc(doc,'translated')">译文</button><button class="text-xs border rounded px-2 py-1" @click="openDoc(doc,'original')">原文</button></td></tr></template>
                        </tbody></table>
                    </div>
                </div>
            </section>
            <section x-show="active==='chat'" class="grid grid-cols-12 gap-6">
                <div class="col-span-4 card rounded-[28px] p-6 space-y-4 text-sm">
                    <input x-model.trim="chatForm.sessionName" class="rounded-2xl border border-slate-200 px-4 py-3" placeholder="新会话名称">
                    <div class="grid grid-cols-2 gap-3">
                        <select x-model="chatForm.sourceLanguage" class="rounded-2xl border border-slate-200 px-4 py-3"><template x-for="lang in languages" :key="'cs'+lang.value"><option :value="lang.value" x-text="lang.label"></option></template></select>
                        <select x-model="chatForm.targetLanguage" class="rounded-2xl border border-slate-200 px-4 py-3"><template x-for="lang in targetLanguages" :key="'ct'+lang.value"><option :value="lang.value" x-text="lang.label"></option></template></select>
                    </div>
                    <button class="rounded-xl bg-blue-600 text-white px-4 py-3" @click="createSession()">新建会话</button>
                    <div class="rounded-2xl bg-blue-50 border border-blue-100 px-4 py-3 text-sm text-blue-700">
                        适合连续咨询与客服沟通场景，可按会话保存历史消息
                    </div>
                    <div class="flex items-center justify-between">
                        <p class="font-semibold text-slate-900">会话列表</p>
                        <button class="text-sm border rounded-xl px-3 py-2" @click="refreshSessions()">刷新</button>
                    </div>
                    <div class="space-y-2 max-h-[420px] overflow-y-auto hide-scrollbar">
                        <template x-if="sessions.length===0"><div class="text-slate-400">暂无会话</div></template>
                        <template x-for="s in sessions" :key="s.sessionId">
                            <div class="rounded-2xl border px-4 py-3" :class="activeSession && activeSession.sessionId===s.sessionId ? 'bg-blue-50 border-blue-200' : 'border-slate-200'">
                                <div class="flex items-start justify-between gap-3">
                                    <button class="flex-1 text-left" @click="selectSession(s)">
                                        <div class="font-medium" x-text="s.sessionName || s.sessionId"></div>
                                        <div class="text-xs text-slate-400" x-text="(s.sourceLanguage || '--') + ' -> ' + (s.targetLanguage || '--')"></div>
                                    </button>
                                    <button class="shrink-0 rounded-lg px-2 py-1 text-xs text-slate-400 hover:text-red-500 hover:bg-red-50" @click.stop="deleteSession(s)" title="删除会话">
                                        删除
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <div class="col-span-8 card rounded-[28px] p-6 flex flex-col min-h-[620px]">
                    <div class="flex-1 overflow-y-auto hide-scrollbar space-y-4">
                        <template x-if="messages.length===0">
                            <div class="text-slate-400 text-sm text-center py-12">
                                <p class="mb-2">请选择或创建一个会话，开始客服对话</p>
                                <p class="text-xs">同一会话内会保留历史消息，便于连续沟通</p>
                            </div>
                        </template>
                        <template x-for="m in messages" :key="m.localId">
                            <div class="flex" :class="m.role==='assistant' ? 'justify-start' : 'justify-end'">
                                <div class="max-w-[78%] rounded-3xl px-4 py-3 text-sm leading-6"
                                     :class="m.role==='assistant' ? 'bg-slate-100 text-slate-700' : 'bg-blue-600 text-white'">
                                    <span x-text="chatMessageText(m)"></span>
                                    <template x-if="shouldShowChatDots(m)">
                                        <span class="inline-flex gap-1 ml-2 align-middle">
                                            <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay:0ms"></span>
                                            <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay:150ms"></span>
                                            <span class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay:300ms"></span>
                                        </span>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                    <div class="mt-4 flex gap-3"><textarea x-model="chatForm.message" class="flex-1 min-h-[88px] rounded-[24px] border border-slate-200 p-4 resize-none text-sm" placeholder="输入消息"></textarea><button class="rounded-[24px] bg-blue-600 text-white px-5 py-4 text-sm" @click="sendMessage()" :disabled="!activeSession || chatStreaming">发送</button></div>
                </div>
            </section>

            <section x-show="active==='term'" class="grid grid-cols-12 gap-6">
                <div class="col-span-4 card rounded-[28px] p-6 space-y-3 text-sm">
                    <input x-model.trim="termForm.sourceTerm" class="rounded-2xl border border-slate-200 px-4 py-3" placeholder="源术语">
                    <input x-model.trim="termForm.targetTerm" class="rounded-2xl border border-slate-200 px-4 py-3" placeholder="目标术语">
                    <div class="grid grid-cols-2 gap-3">
                        <select x-model="termForm.sourceLanguage" class="rounded-2xl border border-slate-200 px-4 py-3"><template x-for="lang in targetLanguages" :key="'ts'+lang.value"><option :value="lang.value" x-text="lang.label"></option></template></select>
                        <select x-model="termForm.targetLanguage" class="rounded-2xl border border-slate-200 px-4 py-3"><template x-for="lang in targetLanguages" :key="'tt'+lang.value"><option :value="lang.value" x-text="lang.label"></option></template></select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select x-model="termForm.category" class="rounded-2xl border border-slate-200 px-4 py-3"><template x-for="c in categories" :key="c"><option :value="c" x-text="getCategoryLabel(c)"></option></template></select>
                        <input x-model.trim="termForm.domain" class="rounded-2xl border border-slate-200 px-4 py-3" placeholder="领域">
                    </div>
                    <textarea x-model.trim="termForm.definition" class="min-h-[120px] rounded-2xl border border-slate-200 p-4 resize-none" placeholder="备注"></textarea>
                    <button class="rounded-xl bg-blue-600 text-white px-4 py-3" @click="saveTerm()" x-text="termForm.id ? '更新术语' : '新增术语'"></button>
                </div>
                <div class="col-span-8 card rounded-[28px] p-6">
                    <div class="flex items-center justify-between"><p class="font-semibold text-slate-900">术语库</p><button class="text-sm border rounded-xl px-3 py-2" @click="refreshTerms()">刷新</button></div>
                    <div class="mt-4 grid grid-cols-3 gap-3 text-sm"><div class="rounded-2xl bg-slate-50 p-3">总数：<span x-text="termStats.totalEntries || 0"></span></div><div class="rounded-2xl bg-slate-50 p-3">已加载：<span x-text="terms.length"></span></div><div class="rounded-2xl bg-slate-50 p-3">分类：<span x-text="Object.keys(termStats.categoryCounts || {}).length"></span></div></div>
                    <div class="mt-4 overflow-x-auto text-sm"><table class="min-w-full"><thead class="text-slate-500"><tr><th class="py-2 text-left">源术语</th><th class="py-2 text-left">目标术语</th><th class="py-2 text-left">分类</th><th class="py-2 text-left">操作</th></tr></thead><tbody><template x-if="terms.length===0"><tr><td colspan="4" class="py-8 text-slate-400">暂无术语</td></tr></template><template x-for="term in terms" :key="term.id"><tr class="border-t border-slate-100"><td class="py-3" x-text="term.sourceTerm"></td><td class="py-3" x-text="term.targetTerm"></td><td class="py-3" x-text="getCategoryLabel(term.category)"></td><td class="py-3 space-x-2"><button class="text-xs border rounded px-2 py-1" @click="editTerm(term)">编辑</button><button class="text-xs border rounded px-2 py-1" @click="removeTerm(term)">删除</button></td></tr></template></tbody></table></div>
                </div>
            </section>

            <section x-show="active==='quality'" class="grid grid-cols-12 gap-6">
                <div class="col-span-5 card rounded-[28px] p-6 space-y-4 text-sm">
                    <textarea x-model="qualityForm.sourceText" @input="markQualityDirty()" class="min-h-[180px] rounded-[24px] border border-slate-200 p-4 resize-none" placeholder="源文"></textarea>
                    <textarea x-model="qualityForm.targetText" @input="markQualityDirty()" class="min-h-[180px] rounded-[24px] border border-slate-200 p-4 resize-none" placeholder="译文"></textarea>
                    <div class="grid grid-cols-2 gap-3">
                        <select x-model="qualityForm.sourceLanguage" @change="markQualityDirty()" class="rounded-2xl border border-slate-200 px-4 py-3"><template x-for="lang in languages" :key="'qs'+lang.value"><option :value="lang.value" x-text="lang.label"></option></template></select>
                        <select x-model="qualityForm.targetLanguage" @change="markQualityDirty()" class="rounded-2xl border border-slate-200 px-4 py-3"><template x-for="lang in targetLanguages" :key="'qt'+lang.value"><option :value="lang.value" x-text="lang.label"></option></template></select>
                    </div>
                    <div class="flex gap-3">
                        <button class="rounded-xl border border-slate-200 px-3 py-2" @click="useTextResult()">使用上方译文</button>
                        <button class="rounded-xl bg-blue-600 text-white px-4 py-2 flex items-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed" @click="runQuality()" :disabled="qualityStatus==='loading'">
                            <template x-if="qualityStatus==='loading'"><i class="fas fa-spinner fa-spin text-xs"></i></template>
                            <span x-text="qualityStatus==='loading' ? '评估中...' : '开始评估'"></span>
                        </button>
                    </div>
                </div>
                <div class="col-span-7 card rounded-[28px] p-6">
                    <template x-if="qualityStatus==='idle'">
                        <div class="text-slate-400 text-sm text-center py-12">
                            <div class="text-4xl mb-4 text-slate-300"><i class="fas fa-clipboard-check"></i></div>
                            <p>请先执行质量评估</p>
                            <p class="text-xs mt-2">输入源文和译文后，点击左侧“开始评估”</p>
                        </div>
                    </template>
                    <template x-if="qualityStatus==='loading'">
                        <div class="text-center py-12">
                            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 mb-4">
                                <i class="fas fa-spinner fa-spin text-2xl text-blue-500"></i>
                            </div>
                            <p class="text-slate-700 font-medium">正在进行质量评估，请稍候...</p>
                            <p class="text-xs text-slate-400 mt-2">系统正在从术语、数字、格式和整体质量等维度进行检查</p>
                        </div>
                    </template>
                    <template x-if="qualityStatus==='done' && qualityResult">
                        <div class="space-y-4 text-sm">
                            <div class="grid grid-cols-4 gap-3">
                                <template x-for="item in qualityCards()" :key="item.label">
                                    <div class="rounded-2xl bg-slate-50 p-4">
                                        <p class="text-xs text-slate-400" x-text="item.label"></p>
                                        <p class="mt-2 text-2xl font-semibold text-slate-900" x-text="item.value"></p>
                                    </div>
                                </template>
                            </div>
                            <div class="rounded-2xl bg-slate-50 p-4 space-y-2">
                                <p>是否建议重试：<span x-text="booleanLabel(qualityResult.needsRetry)"></span></p>
                                <p>是否需要人工复核：<span x-text="booleanLabel(qualityResult.needsHumanReview)"></span></p>
                                <p>是否可写入术语记忆：<span x-text="booleanLabel(qualityResult.tmEligible)"></span></p>
                            </div>
                        </div>
                    </template>
                    <template x-if="qualityStatus==='error'">
                        <div class="text-center py-12">
                            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-50 mb-4">
                                <i class="fas fa-exclamation-circle text-2xl text-red-500"></i>
                            </div>
                            <p class="text-slate-700 font-medium">质量评估失败，请重试</p>
                            <p class="text-xs text-slate-400 mt-2">如果问题持续存在，请检查网络连接或稍后重试</p>
                            <button class="mt-4 text-sm text-blue-600 hover:text-blue-700" @click="resetQualityState()">
                                重新评估
                            </button>
                        </div>
                    </template>
                </div>
            </section>
        </section>
    </main>
</div>

<th:block th:fragment="page-scripts">
    <script th:inline="none">
        function app(){return {
            active:'text', engines:[], docs:[], sessions:[], messages:[], terms:[], termStats:{}, qualityResult:null, qualityStatus:'idle',
            currentUser:null, membershipInfo:null, pointsBalance:null,
            textTimeline:[], textLoading:false, chatStreaming:false, textEventSource:null, chatEventSource:null, docTimer:null, typeTimer:null, previewSource:'',
            chatTypewriterTimer:null, chatTypewriterQueue:[], chatStreamingBotId:null, chatFinalDonePending:null,
            activeSession:null,
            categories:['GENERAL','TECHNOLOGY','BUSINESS','MEDICAL','LEGAL','FINANCE','EDUCATION','SCIENCE'],
            categoryLabels:{GENERAL:'通用',TECHNOLOGY:'技术',BUSINESS:'商业',MEDICAL:'医疗',LEGAL:'法律',FINANCE:'金融',EDUCATION:'教育',SCIENCE:'科学'},
            stepTypeMap:{CREATED:'已创建',PLAN:'任务规划',RETRIEVE_TERMINOLOGY:'检索术语',TRANSLATE:'执行翻译',QUALITY_CHECK:'质量检查',REVISE:'自动修正',FINALIZE:'结果整理'},
            statusMap:{IDLE:'等待中',CREATED:'等待中',PENDING:'等待中',RUNNING:'进行中',PROCESSING:'进行中',SUCCESS:'成功',COMPLETED:'成功',FAILED:'失败，请重试',ERROR:'失败，请重试',PAUSED:'已暂停',CANCELLED:'已取消'},
            languages:[{value:'auto',label:'自动检测'},{value:'zh',label:'中文'},{value:'en',label:'英语'},{value:'ja',label:'日语'},{value:'ko',label:'韩语'},{value:'fr',label:'法语'},{value:'de',label:'德语'}],
            targetLanguages:[{value:'zh',label:'中文'},{value:'en',label:'英语'},{value:'ja',label:'日语'},{value:'ko',label:'韩语'},{value:'fr',label:'法语'},{value:'de',label:'德语'}],
            textForm:{sourceText:'',sourceLanguage:'auto',targetLanguage:'en',translationEngine:'',domain:'general'},
            textResult:{taskId:null,status:'IDLE',currentStep:'',selectedModel:'',previewText:'',finalText:'',needHumanReview:false,qualityScore:null,reviewReasonCode:'',revisionApplied:false,revisionSummary:''},
            docForm:{file:null,sourceLanguage:'auto',targetLanguage:'en',translationEngine:'',translationType:'STANDARD'},
            chatForm:{sessionName:'',sourceLanguage:'zh',targetLanguage:'en',message:''},
            termForm:{id:null,sourceTerm:'',targetTerm:'',sourceLanguage:'en',targetLanguage:'zh',category:'GENERAL',domain:'',definition:''},
            qualityForm:{sourceText:'',targetText:'',sourceLanguage:'auto',targetLanguage:'en'},
            tab(name){return this.active===name?'bg-white text-slate-900':'bg-white/5 text-slate-300'},
            title(){return {text:'文本翻译',document:'文档翻译',chat:'客服对话',term:'术语库',quality:'质量评估'}[this.active]},
            preferredEngine(list){if(!Array.isArray(list)||list.length===0)return ''; if(list.includes('QWEN'))return 'QWEN'; return list[0] || ''},
            authFetch(url,opt){return window.authorizedFetch?window.authorizedFetch(url,opt):fetch(url,opt)},
            async req(url,opt){const r=await this.authFetch(url,opt); if(!r.ok){throw new Error(await r.text()||r.statusText)} if(r.status===204)return null; const payload=await r.json(); if(payload&&typeof payload==='object'&&Object.prototype.hasOwnProperty.call(payload,'success')&&Object.prototype.hasOwnProperty.call(payload,'data')){ if(payload.success===false){throw new Error(payload.message||payload.error||'Request failed')} return payload.data } return payload},
            toast(msg,type){if(typeof Utils!=='undefined'&&Utils.showToast){Utils.showToast(msg,type||'info')} else {console.log(type,msg)}},
            json(v,d){if(v==null)return d; if(typeof v==='object')return v; try{return JSON.parse(v)}catch(e){return d}},
            user(){if(this.currentUser)return this.currentUser; try{return JSON.parse(localStorage.getItem('authUser')||'null')}catch(e){return null}},
            userId(){const u=this.user(); const n=u&&u.id!=null?Number(u.id):null; return Number.isFinite(n)?n:null},
            userName(){const u=this.user(); return u?(u.nickname||u.username||'当前用户'):'当前用户'},
            loggedIn(){return this.userId()!=null},
            userMeta(){const u=this.user(); if(!u)return '未登录'; if(u.phone)return u.phone; return u.role||'普通用户'},
            membershipBadgeText(){return this.membershipInfo&&this.membershipInfo.active?(this.membershipInfo.typeDesc||this.membershipInfo.type||'会员已开通'):'未开通会员'},
            pointsText(){return this.pointsBalance!=null?String(this.pointsBalance):'--'},
            membershipDetailText(){if(!this.loggedIn())return '登录后可查看会员状态与点数余额'; if(this.membershipInfo&&this.membershipInfo.active){const remain=this.membershipInfo.remainingQuota!=null?this.membershipInfo.remainingQuota:0; return `当前会员剩余配额 ${remain}`;} return '当前为普通用户，可前往会员中心开通套餐'},
            headerSubtitle(){if(!this.loggedIn())return '登录后可同步使用会员、订单和个人资料能力'; if(this.membershipInfo&&this.membershipInfo.active)return `已开通${this.membershipInfo.typeDesc||this.membershipInfo.type||'会员'}，可继续使用翻译与会员能力`; return '当前为普通用户，可直接开通会员并查看订单记录'},
            booleanLabel(value){return value ? '是' : '否'},
            chatMessageText(message){if(!message)return ''; if(message.role!=='assistant')return message.text||''; return message.displayText || message.statusText || message.text || ''},
            shouldShowChatDots(message){return !!(message && message.role==='assistant' && (message.phase==='pending' || message.phase==='streaming'))},
            getCategoryLabel(value){return this.categoryLabels[value] || value || '--'},
            getStepTypeLabel(step){const type=(step&& (step.stepType||step.stepName)) || ''; return this.stepTypeMap[type] || type || '--'},
            getStatusLabel(status){return this.statusMap[status] || status || '--'},
            reviseReasonLabel(reason){return {QUALITY_PASSED:'本次质量通过，未触发自动修正',ENGINE_UNSUPPORTED:'当前引擎暂不支持自动修正',SENSITIVE_CONTENT:'检测到敏感内容，跳过自动修正',POST_REVISE_PASSED:'修正后复检通过',POST_REVISE_FAILED:'修正后复检未通过，已转人工复核',REVISE_TRIGGERED:'发现硬规则问题，准备自动修正'}[reason] || ''},
            stepSummary(step){if(!step)return '暂无信息'; const type=step.stepType||step.stepName||''; const status=String(step.status||'').toUpperCase(); if(status==='FAILED'||status==='ERROR'){return step.errorMessage || '失败，请重试'} const out=this.json(step.outputJson,null) || {}; if(type==='CREATED')return '任务已创建'; if(type==='PLAN')return '已生成执行步骤'; if(type==='RETRIEVE_TERMINOLOGY')return '已完成术语与历史检索'; if(type==='TRANSLATE')return out.translatedText ? '已生成译文预览' : '正在生成译文'; if(type==='QUALITY_CHECK'){const hint=this.reviseReasonLabel(out.reviseSkipReason); if(out.phase==='POST_REVISE'){return hint || (out.reviseDecision==='HUMAN_REVIEW' ? '复检未通过，已转人工复核' : '修正后复检已完成')} if(out.reviseDecision==='REVISE')return hint || '发现硬规则问题，准备自动修正'; if(out.needsHumanReview)return hint || '已完成质量检查，需人工复核'; return hint || '已完成质量检查'} if(type==='REVISE')return out.revisionApplied ? (out.revisionSummary || '已完成自动修正') : '自动修正未成功'; if(type==='FINALIZE')return status==='SUCCESS' || status==='COMPLETED' ? '任务已完成' : '结果整理中'; return '处理中'},
            init(){const boot=window.ensureAuthHydrated?window.ensureAuthHydrated():Promise.resolve(this.user()); Promise.resolve(boot).finally(()=>this.syncAuthState()); window.addEventListener('auth-state-changed',e=>{this.currentUser=e&&e.detail?e.detail.user||null:null; this.syncAuthState()});window.addEventListener('storage',()=>this.syncAuthState());window.addEventListener('beforeunload',()=>{this.closeText();this.closeChatConnection();this.stopChatTypewriter();this.stopDocPoll()})},
            async syncAuthState(){this.currentUser=this.user(); if(!this.loggedIn()){this.membershipInfo=null; this.pointsBalance=null; this.engines=[]; this.docs=[]; this.sessions=[]; this.messages=[]; this.terms=[]; this.termStats={}; this.stopDocPoll(); return} await Promise.all([this.loadMembershipInfo(),this.loadPointsBalance(),this.loadProtectedWorkspaceData()])},
            async loadProtectedWorkspaceData(){await Promise.all([this.loadEngines(),this.loadDocs(),this.loadSessions(),this.loadTerms(),this.loadTermStats()])},
            async loadMembershipInfo(){try{this.membershipInfo=await this.req('/api/membership/current',{authPromptOn401:false})||null}catch(e){this.membershipInfo=null}},
            async loadPointsBalance(){try{const data=await this.req('/api/points/balance',{authPromptOn401:false}); this.pointsBalance=data&&data.balance!=null?data.balance:null}catch(e){this.pointsBalance=null}},
            openLogin(){try{const loginEl=document.getElementById('loginModal'); if(loginEl)(bootstrap.Modal.getInstance(loginEl)||new bootstrap.Modal(loginEl)).show()}catch(e){window.location.assign('/login')}},
            openMembership(){window.location.assign('/membership')},
            openOrders(){if(!this.loggedIn()){this.openLogin(); return} window.location.assign('/orders')},
            openProfile(){if(!this.loggedIn()){this.openLogin(); return} window.location.assign('/profile')},
            logout(){if(window.handleLogout)window.handleLogout(); this.currentUser=null; this.membershipInfo=null; this.pointsBalance=null},
            setPanel(name){this.active=name},
            async loadEngines(){try{const data=await this.req('/api/translation/engines');this.engines=Array.isArray(data)?data:[]; const preferred=this.preferredEngine(this.engines); if((!this.textForm.translationEngine||!this.engines.includes(this.textForm.translationEngine))&&preferred)this.textForm.translationEngine=preferred; if((!this.docForm.translationEngine||!this.engines.includes(this.docForm.translationEngine))&&preferred)this.docForm.translationEngine=preferred}catch(e){}},
            async detectLang(){if(!this.textForm.sourceText.trim())return; try{const d=await this.req('/api/translation/detect-language',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.textForm.sourceText),authPromptOn401:true}); if(d.language)this.textForm.sourceLanguage=d.language; this.toast('语言识别完成','success')}catch(e){this.toast('语言识别失败: '+e.message,'danger')}},
            resetText(){this.closeText(); this.textTimeline=[]; this.previewSource=''; this.textResult={taskId:null,status:'CREATED',currentStep:'',selectedModel:'',previewText:'',finalText:'',needHumanReview:false,qualityScore:null,reviewReasonCode:'',revisionApplied:false,revisionSummary:''}; if(this.typeTimer){clearInterval(this.typeTimer); this.typeTimer=null}},
            async startTextTask(){if(!this.textForm.sourceText.trim()||this.textLoading)return; this.resetText(); this.textLoading=true; try{const task=await this.req('/api/agent/tasks/text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:this.userId(),sourceText:this.textForm.sourceText,sourceLanguage:this.textForm.sourceLanguage,targetLanguage:this.textForm.targetLanguage,domain:this.textForm.domain||null,translationEngine:this.textForm.translationEngine||null,bizType:'HOME_TEXT_WORKSPACE'}),authPromptOn401:true}); this.textResult.taskId=task.id; this.textResult.status=task.status||'CREATED'; this.textResult.currentStep=task.currentStep||''; this.textResult.selectedModel=task.selectedModel||''; this.subText(task.id)}catch(e){this.textLoading=false; this.toast('创建任务失败: '+e.message,'danger')}},
            subText(id){this.closeText(); const es=new EventSource('/api/agent/tasks/'+id+'/events'); this.textEventSource=es; es.addEventListener('snapshot',e=>{const d=this.json(e.data,{}); this.textResult.status=d.taskStatus||this.textResult.status; this.textResult.currentStep=d.currentStep||''; this.textResult.needHumanReview=!!d.needHumanReview; this.textResult.reviewReasonCode=d.reviewReasonCode||''; this.textTimeline=Array.isArray(d.steps)?d.steps:[]; this.textTimeline.forEach(s=>this.tryPreview(s))}); es.addEventListener('task',e=>{const d=this.json(e.data,{}); this.textResult.status=d.taskStatus||this.textResult.status; this.textResult.currentStep=d.currentStep||this.textResult.currentStep; this.textResult.selectedModel=d.selectedModel||this.textResult.selectedModel; if(d.finalQualityScore!=null)this.textResult.qualityScore=d.finalQualityScore}); es.addEventListener('step',e=>{const step=this.json(e.data,{}); const i=this.textTimeline.findIndex(x=>(x.id&&step.id&&x.id===step.id)||((x.stepNo||-1)===(step.stepNo||-2)&&x.stepType===step.stepType)); if(i>=0)this.textTimeline.splice(i,1,step); else this.textTimeline.push(step); this.textTimeline.sort((a,b)=>(a.stepNo||0)-(b.stepNo||0)); this.tryPreview(step)}); es.addEventListener('result',e=>{const d=this.json(e.data,{}); this.textResult.finalText=d.finalResponse||''; this.textResult.selectedModel=d.selectedModel||this.textResult.selectedModel; this.textResult.needHumanReview=!!d.needHumanReview; this.textResult.reviewReasonCode=d.reviewReasonCode||this.textResult.reviewReasonCode; this.textResult.revisionApplied=!!d.revisionApplied; this.textResult.revisionSummary=d.revisionSummary||''; if(d.finalQualityScore!=null)this.textResult.qualityScore=d.finalQualityScore; if(d.finalResponse&&d.finalResponse!==this.previewSource)this.typewrite(d.finalResponse)}); es.addEventListener('done',e=>{const d=this.json(e.data,{}); this.textResult.status=d.terminalStatus||this.textResult.status; this.textLoading=false; this.closeText()}); es.onerror=()=>{this.textLoading=false; this.closeText()}},
            closeText(){if(this.textEventSource){this.textEventSource.close(); this.textEventSource=null}},
            tryPreview(step){if(!step||String(step.stepType||'').toUpperCase()!=='TRANSLATE')return; const out=this.json(step.outputJson,null); if(out&&out.translatedText)this.typewrite(out.translatedText)},
            typewrite(text){if(!text||text===this.previewSource)return; this.previewSource=text; if(this.typeTimer)clearInterval(this.typeTimer); this.textResult.previewText=''; let i=0; this.typeTimer=setInterval(()=>{if(i>=text.length){clearInterval(this.typeTimer); this.typeTimer=null; return} this.textResult.previewText+=text.charAt(i); i+=1},18)},
            async polishText(){const mt=(this.textResult.finalText||this.textResult.previewText||'').trim(); if(!mt){this.toast('没有可润色的译文','warning');return} try{const d=await this.req('/api/translation/polish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sourceText:this.textForm.sourceText,mtText:mt,sourceLanguage:this.textForm.sourceLanguage,targetLanguage:this.textForm.targetLanguage,domain:this.textForm.domain||null,style:'HOME_PAGE_POLISH',userId:this.userId()!=null?String(this.userId()):null}),authPromptOn401:true}); if(d.polishedText){this.textResult.finalText=d.polishedText; this.textResult.previewText=d.polishedText; this.qualityForm.targetText=d.polishedText} this.toast('译文润色完成','success')}catch(e){this.toast('润色失败: '+e.message,'danger')}},
            async copyText(){const text=this.textResult.finalText||this.textResult.previewText; if(!text)return; try{await navigator.clipboard.writeText(text); this.toast('已复制译文','success')}catch(e){this.toast('复制失败','danger')}},
            pickFile(e){const f=e&&e.target?e.target.files:null; this.docForm.file=f&&f.length?f[0]:null},
            async uploadDoc(){if(!this.docForm.file)return; try{const fd=new FormData(); fd.append('file',this.docForm.file); fd.append('sourceLanguage',this.docForm.sourceLanguage); fd.append('targetLanguage',this.docForm.targetLanguage); fd.append('translationType',this.docForm.translationType); fd.append('translationEngine',this.docForm.translationEngine||'google'); fd.append('useTerminology','true'); const created=await this.req('/api/document/upload',{method:'POST',body:fd,authPromptOn401:true}); await this.req('/api/document/start/'+created.id,{method:'POST',authPromptOn401:true}); this.toast('文档任务已创建并启动','success'); this.docForm.file=null; await this.loadDocs()}catch(e){this.toast('文档上传失败: '+e.message,'danger')}},
            async loadDocs(showToast=false){try{const page=await this.req('/api/document/list?page=0&size=20',{authPromptOn401:false}); this.docs=Array.isArray(page.content)?page.content:[]; this.startDocPoll(); if(showToast)this.toast('文档列表已刷新','success')}catch(e){if(showToast)this.toast('刷新文档失败: '+e.message,'danger')}},
            async refreshDocs(){await this.loadDocs(true)},
            docRunning(doc){const s=String((doc&&doc.status)||'').toUpperCase(); const p=Number((doc&&doc.progress)||0); return !(s.includes('SUCCESS')||s.includes('COMPLETED')||s.includes('FAILED')||s.includes('CANCELLED')||s.includes('PAUSED')) && p<100},
            startDocPoll(){this.stopDocPoll(); if(!this.docs.some(d=>this.docRunning(d)))return; this.docTimer=setInterval(()=>{this.docs.filter(d=>this.docRunning(d)).forEach(d=>this.refreshDoc(d))},4000)},
            stopDocPoll(){if(this.docTimer){clearInterval(this.docTimer); this.docTimer=null}},
            async refreshDoc(doc,showToast=false){try{const p=await this.req('/api/document/progress/'+doc.id,{authPromptOn401:false}); const i=this.docs.findIndex(x=>x.id===doc.id); if(i>=0){this.docs.splice(i,1,Object.assign({},this.docs[i],{progress:p.progress,status:p.status||this.docs[i].status,statusMessage:p.statusMessage,errorMessage:p.errorMessage,totalPages:p.totalPages,processedPages:p.processedPages,processingTime:p.processingTime,translationEngine:p.translationEngine||this.docs[i].translationEngine}))} if(showToast)this.toast('进度已更新','success')}catch(e){if(showToast)this.toast('刷新进度失败: '+e.message,'danger')}},
            async retryDoc(doc){try{const q=new URLSearchParams(); if(doc.translationEngine)q.set('translationEngine',doc.translationEngine); if(doc.targetLanguage)q.set('targetLanguage',doc.targetLanguage); await this.req('/api/document/start/'+doc.id+(q.toString()?'?'+q.toString():''),{method:'POST',authPromptOn401:true}); this.toast('文档任务已重新启动','success'); await this.loadDocs()}catch(e){this.toast('重试失败: '+e.message,'danger')}},
            async openDoc(doc,kind){const ep=kind==='original'?'/api/document/original-url/':'/api/document/download-url/'; try{const d=await this.req(ep+doc.id,{authPromptOn401:true}); if(d&&d.url)window.open(d.url,'_blank')}catch(e){this.toast('获取链接失败: '+e.message,'danger')}},
            async loadSessions(showToast=false){try{const data=await this.req('/api/chat/sessions?status=ACTIVE',{authPromptOn401:false}); this.sessions=Array.isArray(data)?data:[]; if(this.activeSession){const current=this.sessions.find(x=>x.sessionId===this.activeSession.sessionId); this.activeSession=current||null} if(!this.activeSession&&this.sessions[0])await this.selectSession(this.sessions[0]); else if(!this.activeSession){this.messages=[]} if(showToast)this.toast('会话列表已刷新','success')}catch(e){if(showToast)this.toast('刷新会话失败: '+e.message,'danger')}},
            async refreshSessions(){await this.loadSessions(true)},
            async createSession(){const name=this.chatForm.sessionName.trim(); if(!name){this.toast('请输入会话名称','warning');return} try{const s=await this.req('/api/chat/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionName:name,sourceLanguage:this.chatForm.sourceLanguage,targetLanguage:this.chatForm.targetLanguage,createdBy:String(this.userId()||888),description:'Homepage realtime workspace'}),authPromptOn401:true}); this.chatForm.sessionName=''; await this.loadSessions(); const current=this.sessions.find(x=>x.sessionId===s.sessionId)||s; await this.selectSession(current); this.toast('会话创建成功','success')}catch(e){this.toast('创建会话失败: '+e.message,'danger')}},
            async selectSession(s){if(!s)return; if(this.activeSession&&this.activeSession.sessionId!==s.sessionId){this.closeChatConnection(); this.stopChatTypewriter(); this.chatStreaming=false} this.activeSession=s; await this.loadMessages(s.sessionId)},
            async loadMessages(id){try{const data=await this.req('/api/chat/sessions/'+id+'/messages?page=0&size=50',{authPromptOn401:false}); const currentUid=this.userId(); this.messages=(Array.isArray(data)?data:[]).map(m=>{const isUser=currentUid!=null?Number(m.userId)===Number(currentUid):Number(m.userId)!==888; return {localId:m.messageId||Math.random().toString(36).slice(2),role:isUser?'user':'assistant',text:isUser?(m.originalText||m.translatedText||''):(m.translatedText||m.originalText||'')}})}catch(e){this.messages=[]}},
            closeChatConnection(){if(this.chatEventSource){this.chatEventSource.close(); this.chatEventSource=null}},
            stopChatTypewriter(){if(this.chatTypewriterTimer){clearInterval(this.chatTypewriterTimer); this.chatTypewriterTimer=null} this.chatTypewriterQueue=[]; this.chatStreamingBotId=null; this.chatFinalDonePending=null},
            enqueueChatTypeChars(botId,text){if(!text)return; if(this.chatStreamingBotId!==botId){this.chatTypewriterQueue=[]; this.chatStreamingBotId=botId} this.chatTypewriterQueue.push(...text.split('')); this.startChatTypewriter()},
            startChatTypewriter(){if(this.chatTypewriterTimer||this.chatTypewriterQueue.length===0)return; this.chatTypewriterTimer=setInterval(()=>{const bot=this.messages.find(m=>m.localId===this.chatStreamingBotId); if(!bot){this.stopChatTypewriter(); this.chatStreaming=false; return} const batchSize=Math.min(this.chatTypewriterQueue.length, Math.random()>0.7?2:1); for(let i=0;i<batchSize&&this.chatTypewriterQueue.length>0;i+=1){bot.displayText=(bot.displayText||'') + this.chatTypewriterQueue.shift()} bot.text=bot.displayText; if(this.chatTypewriterQueue.length===0){clearInterval(this.chatTypewriterTimer); this.chatTypewriterTimer=null; if(this.chatFinalDonePending&&this.chatFinalDonePending.botId===bot.localId){this.finishChatReply(this.chatFinalDonePending.sessionId, bot.localId)}}},30)},
            finishChatReply(sessionId,botId){const bot=this.messages.find(m=>m.localId===botId); if(bot){bot.phase='done'; bot.displayText=bot.finalBuffer||bot.displayText||bot.statusText||bot.text||''; bot.text=bot.displayText} this.chatFinalDonePending=null; this.chatStreaming=false; this.chatStreamingBotId=null; this.loadMessages(sessionId).catch(()=>{})},
            markChatFailed(bot,message){if(bot){bot.phase='error'; bot.statusText='生成失败'; bot.displayText=bot.displayText||message||'当前会话请求失败，请重试'; bot.text=bot.displayText} this.closeChatConnection(); this.stopChatTypewriter(); this.chatStreaming=false},
            async deleteSession(session){if(!session||!session.sessionId)return; const sessionName=session.sessionName||session.sessionId; if(!confirm(`确定要删除会话“${sessionName}”吗？\n删除后该会话将不再显示在列表中。`))return; try{const deletingCurrent=this.activeSession&&this.activeSession.sessionId===session.sessionId; if(deletingCurrent){this.closeChatConnection(); this.stopChatTypewriter(); this.chatStreaming=false; this.activeSession=null; this.messages=[]} await this.req('/api/chat/sessions/'+session.sessionId+'/end',{method:'POST',authPromptOn401:true}); await this.loadSessions(); this.toast('会话已删除','success')}catch(e){this.toast('删除会话失败: '+e.message,'danger')}},
            async sendMessage(){if(!this.activeSession||this.chatStreaming)return; const msg=this.chatForm.message.trim(); if(!msg)return; const sessionId=this.activeSession.sessionId; const sourceLanguage=this.activeSession.sourceLanguage||this.chatForm.sourceLanguage; const targetLanguage=this.activeSession.targetLanguage||this.chatForm.targetLanguage; const uid=this.userId(); const uname=this.userName(); this.messages.push({localId:'user-'+Date.now(),role:'user',text:msg}); const bot={localId:'assistant-'+Date.now(),role:'assistant',text:'',statusText:'正在生成回复...',phase:'pending',finalBuffer:'',displayText:''}; this.messages.push(bot); this.chatForm.message=''; this.closeChatConnection(); this.stopChatTypewriter(); this.chatStreaming=true; this.chatStreamingBotId=bot.localId; const p=new URLSearchParams(); p.set('message',msg); p.set('sourceLanguage',sourceLanguage); p.set('targetLanguage',targetLanguage); p.set('save','true'); if(uid!=null)p.set('userId',String(uid)); if(uname)p.set('userName',uname); const es=new EventSource('/api/chat/sessions/'+sessionId+'/auto-reply?'+p.toString()); this.chatEventSource=es; es.addEventListener('status',e=>{bot.statusText=(e.data||'处理中...').trim(); if(bot.phase==='pending'){bot.text=''; bot.displayText=''}}); es.addEventListener('delta',e=>{const chunk=e.data||''; if(!chunk)return; if(bot.phase!=='streaming'){bot.phase='streaming'; bot.displayText=''; bot.text=''; bot.statusText='正在输出最终回复...'; this.chatTypewriterQueue=[]; this.chatStreamingBotId=bot.localId} bot.finalBuffer += chunk; this.enqueueChatTypeChars(bot.localId, chunk)}); es.addEventListener('done',e=>{const finalText=(e.data||bot.finalBuffer||'').trim(); if(finalText)bot.finalBuffer=finalText; this.closeChatConnection(); if(this.chatTypewriterQueue.length===0&&!this.chatTypewriterTimer){this.finishChatReply(sessionId, bot.localId)} else {this.chatFinalDonePending={sessionId:sessionId,botId:bot.localId}}}); es.addEventListener('failed',e=>{this.markChatFailed(bot,(e.data||'当前会话请求失败，请重试').trim()); this.toast('客服对话生成失败，请稍后重试','danger')}); es.onerror=()=>{if(bot.phase!=='error'&&bot.phase!=='done'){this.markChatFailed(bot,'当前会话请求失败，请重试'); this.toast('客服对话连接中断，请检查当前会话是否可用','danger')}}},
            async loadTerms(showToast=false){try{const d=await this.req('/api/terminology?page=0&size=20',{authPromptOn401:false}); this.terms=Array.isArray(d.data)?d.data:[]; if(showToast)this.toast('术语列表已刷新','success')}catch(e){const msg='术语查询失败: '+e.message; if(showToast)this.toast(msg,'danger'); else this.toast(msg,'danger')}},
            async refreshTerms(){await this.loadTerms(true)},
            async loadTermStats(){try{this.termStats=await this.req('/api/terminology/stats',{authPromptOn401:false})||{}}catch(e){}},
            editTerm(term){this.termForm={id:term.id,sourceTerm:term.sourceTerm||'',targetTerm:term.targetTerm||'',sourceLanguage:term.sourceLanguage||'en',targetLanguage:term.targetLanguage||'zh',category:term.category||'GENERAL',domain:term.domain||'',definition:term.notes||term.definition||''}},
            resetTerm(){this.termForm={id:null,sourceTerm:'',targetTerm:'',sourceLanguage:'en',targetLanguage:'zh',category:'GENERAL',domain:'',definition:''}},
            async saveTerm(){if(!this.termForm.sourceTerm.trim()||!this.termForm.targetTerm.trim()){this.toast('请填写完整术语对','warning');return} const payload={sourceTerm:this.termForm.sourceTerm,targetTerm:this.termForm.targetTerm,sourceLanguage:this.termForm.sourceLanguage,targetLanguage:this.termForm.targetLanguage,category:this.termForm.category,domain:this.termForm.domain,definition:this.termForm.definition}; try{await this.req(this.termForm.id?'/api/terminology/'+this.termForm.id:'/api/terminology',{method:this.termForm.id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),authPromptOn401:true}); this.toast(this.termForm.id?'术语已更新':'术语已新增','success'); this.resetTerm(); await this.loadTerms(); await this.loadTermStats()}catch(e){this.toast('保存术语失败: '+e.message,'danger')}},
            async removeTerm(term){if(!term||!term.id)return; try{await this.req('/api/terminology/'+term.id,{method:'DELETE',authPromptOn401:true}); this.toast('术语已删除','success'); await this.loadTerms(); await this.loadTermStats()}catch(e){this.toast('删除术语失败: '+e.message,'danger')}},
            resetQualityState(){this.qualityStatus='idle'; this.qualityResult=null},
            markQualityDirty(){if(this.qualityStatus==='done'||this.qualityStatus==='error'){this.resetQualityState()}},
            useTextResult(){const t=this.textResult.finalText||this.textResult.previewText; if(!t){this.toast('当前没有可评估的译文','warning');return} this.qualityForm.sourceText=this.textForm.sourceText; this.qualityForm.targetText=t; this.qualityForm.sourceLanguage=this.textForm.sourceLanguage; this.qualityForm.targetLanguage=this.textForm.targetLanguage; this.resetQualityState(); this.active='quality'},
            async runQuality(){if(!this.qualityForm.sourceText.trim()||!this.qualityForm.targetText.trim()){this.toast('请先输入源文和译文','warning');return} this.qualityStatus='loading'; this.qualityResult=null; try{this.qualityResult=await this.req('/api/quality/assess',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sourceText:this.qualityForm.sourceText,targetText:this.qualityForm.targetText,sourceLanguage:this.qualityForm.sourceLanguage,targetLanguage:this.qualityForm.targetLanguage,mode:'AUTOMATIC'}),authPromptOn401:true}); this.qualityStatus='done'; this.toast('质量评估完成','success')}catch(e){this.qualityStatus='error'; this.toast('质量评估失败: '+e.message,'danger')}},
            qualityCards(){const d=this.qualityResult||{}; return [{label:'综合评分',value:d.overallScore??'--'},{label:'术语得分',value:d.terminologyScore??'--'},{label:'数字得分',value:d.numberScore??'--'},{label:'格式得分',value:d.formatScore??'--'},{label:'准确性',value:d.accuracyScore??'--'},{label:'流畅性',value:d.fluencyScore??'--'},{label:'一致性',value:d.consistencyScore??'--'},{label:'大模型评审',value:d.llmJudgeScore??'--'}]}
        }}
    </script>
