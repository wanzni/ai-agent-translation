<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::page-styles}, ~{::page-scripts})}">
<head>
    <title>支付成功</title>
    <th:block th:fragment="page-styles">
        <style>
            .success-hero {
                background: linear-gradient(135deg, #16a34a 0%, #22c55e 50%, #10b981 100%);
                color: white;
                border-radius: 12px;
                padding: 24px;
            }
            .success-icon {
                width: 64px;
                height: 64px;
                border-radius: 50%;
                background: rgba(255,255,255,0.2);
                display: flex;
                align-items: center;
                justify-content: center;
            }
        </style>
    </th:block>
</head>
<body>
<th:block th:fragment="content">
    <div class="container py-4">
        <div class="success-hero mb-4">
            <div class="d-flex align-items-center">
                <div class="success-icon me-3">
                    <i class="fas fa-check fa-2x"></i>
                </div>
                <div>
                    <h3 class="mb-1">支付成功</h3>
                    <div id="descLine" class="opacity-75">会员已开通，权益即时生效。</div>
                </div>
            </div>
        </div>

        <div id="successAlert" class="alert alert-info d-none"></div>

        <div class="row g-3">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-3">
                    <div class="card-header">
                        <strong><i class="fas fa-receipt me-2"></i>订单信息</strong>
                    </div>
                    <div class="card-body">
                        <div class="row mb-2">
                            <div class="col-6">订单号：<span id="orderId">-</span></div>
                            <div class="col-6">用户 ID：<span id="userId">-</span></div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-6">会员类型：<span id="type">-</span></div>
                            <div class="col-6">本期额度：<span id="quota">-</span> 点</div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-6">生效时间：<span id="startAt">-</span></div>
                            <div class="col-6">到期时间：<span id="endAt">-</span></div>
                        </div>
                        <div class="row mb-2">
                            <div class="col-6">支付金额：¥<span id="amount">-</span></div>
                            <div class="col-6">支付时间：<span id="paidAt">-</span></div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header">
                        <strong><i class="fas fa-gift me-2"></i>会员权益</strong>
                    </div>
                    <div class="card-body">
                        <ul class="mb-0">
                            <li>文档翻译、文本翻译和客服场景可直接使用会员能力。</li>
                            <li>会员状态、剩余配额和点数余额会同步回工作台与个人资料页。</li>
                            <li>后续如需查看订单状态，可前往“我的订单”页面查看。</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <a class="btn btn-primary" href="/">返回工作台</a>
                            <a class="btn btn-outline-secondary" href="/membership">返回会员中心</a>
                            <a class="btn btn-outline-primary" href="/orders">查看订单</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="page-scripts">
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);

            function authFetch(url, options) {
                return window.authorizedFetch ? window.authorizedFetch(url, options) : fetch(url, options);
            }

            function unwrapApiPayload(payload) {
                if (payload && typeof payload === 'object' && Object.prototype.hasOwnProperty.call(payload, 'data')) {
                    return payload.data;
                }
                return payload;
            }

            function pad(num) {
                return String(num).padStart(2, '0');
            }

            function formatDateTime(value) {
                if (!value) return '-';
                const date = typeof value === 'string' ? new Date(value.replace('T', ' ')) : new Date(value);
                if (Number.isNaN(date.getTime())) return '-';
                return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
            }

            function fill(id, value) {
                const el = document.getElementById(id);
                if (el) {
                    el.textContent = value == null || value === '' ? '-' : value;
                }
            }

            function typeToZh(type) {
                switch (String(type || '').toUpperCase()) {
                    case 'MONTHLY': return '包月会员';
                    case 'QUARTERLY': return '包季会员';
                    case 'YEARLY': return '包年会员';
                    default: return type || '-';
                }
            }

            function showAlert(message, type) {
                const alertEl = document.getElementById('successAlert');
                alertEl.className = `alert alert-${type}`;
                alertEl.textContent = message;
                alertEl.classList.remove('d-none');
            }

            function render(payload) {
                const typeName = typeToZh(payload.type);
                fill('orderId', payload.orderNo);
                fill('userId', payload.userId);
                fill('type', typeName);
                fill('quota', payload.periodQuota);
                fill('startAt', formatDateTime(payload.startAt));
                fill('endAt', formatDateTime(payload.endAt));
                fill('amount', payload.amount);
                fill('paidAt', formatDateTime(payload.paidAt));
                document.getElementById('descLine').textContent = `恭喜你已开通${typeName}，现在即可使用会员权益。`;
            }

            async function hydrateFromOrder(orderNo) {
                const resp = await authFetch(`/api/membership/order/${encodeURIComponent(orderNo)}`, { authPromptOn401: false });
                if (!resp.ok) {
                    throw new Error('load order failed');
                }
                return unwrapApiPayload(await resp.json());
            }

            async function init() {
                const payload = {
                    orderNo: params.get('orderNo') || '',
                    userId: params.get('userId') || '',
                    type: params.get('type') || '',
                    periodQuota: params.get('periodQuota') || '',
                    startAt: params.get('startAt') || '',
                    endAt: params.get('endAt') || '',
                    amount: params.get('amount') || '',
                    paidAt: params.get('paidAt') || ''
                };

                if (payload.orderNo && (!payload.type || !payload.periodQuota || !payload.paidAt)) {
                    try {
                        const order = await hydrateFromOrder(payload.orderNo);
                        render(order);
                        return;
                    } catch (e) {
                        showAlert('支付成功，但订单信息读取失败，可前往订单页查看详情。', 'warning');
                    }
                }

                if (payload.orderNo) {
                    render(payload);
                } else {
                    showAlert('缺少订单信息，可前往订单页查看支付结果。', 'warning');
                }
            }

            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</th:block>
</body>
</html>
