<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::page-styles}, ~{::page-scripts})}">
<head>
    <title>术语库管理 - 智能翻译助手</title>
    
    <!-- 页面特定样式 -->
    <th:block th:fragment="page-styles">
        <style>
            .terminology-container {
                max-width: 1200px;
                margin: 0 auto;
            }

            .terminology-card {
                background: white;
                border-radius: 0.75rem;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                overflow: hidden;
            }

            .terminology-header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 1.5rem;
            }

            .search-box {
                background: #f8fafc;
                border-radius: 0.5rem;
                padding: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .terminology-table {
                border-collapse: separate;
                border-spacing: 0;
                width: 100%;
            }

            .terminology-table th,
            .terminology-table td {
                padding: 1rem;
                text-align: left;
                border-bottom: 1px solid #e2e8f0;
            }

            .terminology-table th {
                background: #f1f5f9;
                font-weight: 600;
            }

            .terminology-table tr:last-child td {
                border-bottom: none;
            }

            .terminology-table tr:hover td {
                background: #f8fafc;
            }

            .action-buttons .btn {
                padding: 0.25rem 0.5rem;
                font-size: 0.875rem;
            }

            .import-export-section {
                background: #f8fafc;
                border-radius: 0.5rem;
                padding: 1.5rem;
                margin-top: 1.5rem;
            }
        </style>
    </th:block>
</head>

<body>
    <div th:fragment="content">
        <div class="terminology-container">
            <!-- 页面标题 -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">术语库管理</h1>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTerminologyModal">
                    <i class="fas fa-plus me-1"></i>添加术语
                </button>
            </div>

            <!-- 搜索框 -->
            <div class="search-box">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">源术语</label>
                        <input type="text" class="form-control" placeholder="搜索源术语">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">目标术语</label>
                        <input type="text" class="form-control" placeholder="搜索目标术语">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">语言对</label>
                        <select class="form-select">
                            <option value="">全部语言对</option>
                            <option value="en-zh">英语 → 中文</option>
                            <option value="zh-en">中文 → 英语</option>
                            <option value="ja-zh">日语 → 中文</option>
                            <option value="zh-ja">中文 → 日语</option>
                        </select>
                    </div>
                    <div class="col-md-12">
                        <div class="d-flex justify-content-end">
                            <button class="btn btn-primary me-2">
                                <i class="fas fa-search me-1"></i>搜索
                            </button>
                            <button class="btn btn-outline-secondary">
                                <i class="fas fa-undo me-1"></i>重置
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 术语列表 -->
            <div class="terminology-card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="terminology-table">
                            <thead>
                                <tr>
                                    <th>源术语</th>
                                    <th>目标术语</th>
                                    <th>语言对</th>
                                    <th>领域</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Hello World</td>
                                    <td>你好世界</td>
                                    <td>英语 → 中文</td>
                                    <td>计算机</td>
                                    <td>2024-01-15</td>
                                    <td class="action-buttons">
                                        <button class="btn btn-sm btn-outline-primary me-1">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Good morning</td>
                                    <td>早上好</td>
                                    <td>英语 → 中文</td>
                                    <td>日常用语</td>
                                    <td>2024-01-14</td>
                                    <td class="action-buttons">
                                        <button class="btn btn-sm btn-outline-primary me-1">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Thank you</td>
                                    <td>谢谢</td>
                                    <td>英语 → 中文</td>
                                    <td>日常用语</td>
                                    <td>2024-01-13</td>
                                    <td class="action-buttons">
                                        <button class="btn btn-sm btn-outline-primary me-1">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 分页 -->
            <nav class="d-flex justify-content-end mt-4">
                <ul class="pagination">
                    <li class="page-item disabled">
                        <a class="page-link" href="#" tabindex="-1">上一页</a>
                    </li>
                    <li class="page-item active">
                        <a class="page-link" href="#">1</a>
                    </li>
                    <li class="page-item">
                        <a class="page-link" href="#">2</a>
                    </li>
                    <li class="page-item">
                        <a class="page-link" href="#">3</a>
                    </li>
                    <li class="page-item">
                        <a class="page-link" href="#">下一页</a>
                    </li>
                </ul>
            </nav>

            <!-- 导入导出 -->
            <div class="import-export-section">
                <h5 class="mb-3">导入/导出术语库</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="border rounded p-3">
                            <h6 class="mb-3">导入术语</h6>
                            <div class="mb-3">
                                <label class="form-label">选择文件</label>
                                <input class="form-control" type="file" accept=".csv,.xlsx">
                            </div>
                            <button class="btn btn-success">
                                <i class="fas fa-upload me-1"></i>导入
                            </button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="border rounded p-3">
                            <h6 class="mb-3">导出术语</h6>
                            <div class="mb-3">
                                <label class="form-label">导出格式</label>
                                <select class="form-select">
                                    <option>Excel (.xlsx)</option>
                                    <option>CSV (.csv)</option>
                                    <option>JSON (.json)</option>
                                </select>
                            </div>
                            <button class="btn btn-info">
                                <i class="fas fa-download me-1"></i>导出
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 添加术语模态框 -->
        <div class="modal fade" id="addTerminologyModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">添加术语</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label class="form-label">源术语</label>
                                <input type="text" class="form-control" placeholder="输入源术语">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">目标术语</label>
                                <input type="text" class="form-control" placeholder="输入目标术语">
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">源语言</label>
                                    <select class="form-select">
                                        <option>英语</option>
                                        <option>中文</option>
                                        <option>日语</option>
                                        <option>韩语</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">目标语言</label>
                                    <select class="form-select">
                                        <option>中文</option>
                                        <option>英语</option>
                                        <option>日语</option>
                                        <option>韩语</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">领域</label>
                                <input type="text" class="form-control" placeholder="输入领域（如：计算机、医学等）">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary">保存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页面特定脚本 -->
    <th:block th:fragment="page-scripts">
        <script>
            $(document).ready(function() {
                // 获取认证token的辅助函数
                function getAuthToken() {
                    const fromCookie = (function() {
                        const value = `; ${document.cookie}`;
                        const parts = value.split(`; auth_token=`);
                        if (parts.length === 2) return parts.pop().split(';').shift();
                        return null;
                    })();
                    if (fromCookie && fromCookie.trim()) return fromCookie.trim();
                    const fromLocal = localStorage.getItem('authToken');
                    return (fromLocal && fromLocal.trim()) ? fromLocal.trim() : null;
                }

                // 使用authorizedFetch包装fetch
                async function authorizedFetch(url, options) {
                    const token = getAuthToken();
                    const opts = options || {};
                    const fetchOptions = Object.assign({}, opts);
                    fetchOptions.headers = Object.assign({}, fetchOptions.headers || {});
                    if (token) {
                        fetchOptions.headers['Authorization'] = `Bearer ${token}`;
                    }
                    try {
                        const authUser = JSON.parse(localStorage.getItem('authUser') || 'null');
                        if (authUser && authUser.id) {
                            fetchOptions.headers['X-User-Id'] = String(authUser.id);
                        }
                    } catch (_) {}
                    const resp = await fetch(url, fetchOptions);
                    if (resp.status === 401) {
                        Utils.showToast('请先登录后再进行此操作', 'warning');
                        const loginEl = document.getElementById('loginModal');
                        if (loginEl) {
                            const m = bootstrap.Modal.getInstance(loginEl) || new bootstrap.Modal(loginEl);
                            m.show();
                        }
                    }
                    return resp;
                }

                // 术语库API
                const TerminologyAPI = {
                    async list(params = {}) {
                        const qs = new URLSearchParams();
                        for (const [k, v] of Object.entries(params)) {
                            if (v === undefined || v === null) continue;
                            if (typeof v === 'string') {
                                const t = v.trim();
                                if (t === '') continue;
                                qs.append(k, t);
                            } else {
                                qs.append(k, String(v));
                            }
                        }
                        const url = `/api/terminology${qs.toString() ? `?${qs.toString()}` : ''}`;
                        const res = await authorizedFetch(url);
                        const json = await res.json();
                        if (json && json.success === false) throw new Error(json.message || '查询失败');
                        return json;
                    },
                    async stats(params = {}) {
                        const qs = new URLSearchParams();
                        for (const [k, v] of Object.entries(params || {})) {
                            if (v === undefined || v === null) continue;
                            const t = typeof v === 'string' ? v.trim() : String(v);
                            if (t) qs.append(k, t);
                        }
                        const url = `/api/terminology/stats${qs.toString() ? `?${qs.toString()}` : ''}`;
                        const res = await authorizedFetch(url);
                        const json = await res.json();
                        if (json && json.success === false) throw new Error(json.message || '统计查询失败');
                        return (json && json.data) ? json.data : json;
                    },
                    async create(payload) {
                        const res = await authorizedFetch('/api/terminology', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const json = await res.json();
                        if (json && json.success === false) throw new Error(json.message || '创建失败');
                        return json;
                    },
                    async update(id, payload) {
                        const res = await authorizedFetch(`/api/terminology/${id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const json = await res.json();
                        if (json && json.success === false) throw new Error(json.message || '更新失败');
                        return json;
                    },
                    async remove(id) {
                        const res = await authorizedFetch(`/api/terminology/${id}`, { method: 'DELETE' });
                        const json = await res.json();
                        if (json && json.success === false) throw new Error(json.message || '删除失败');
                        return json;
                    }
                };

                // 页面状态
                let currentPage = 0;
                let pageSize = 10;
                let totalPages = 0;
                let totalElements = 0;

                // 加载术语列表
                async function loadTerminologyList() {
                    const keyword = $('.search-box input[placeholder="搜索源术语"]').val() || 
                                   $('.search-box input[placeholder="搜索目标术语"]').val() || '';
                    const langPair = $('.search-box select').val() || '';
                    const [sourceLanguage, targetLanguage] = langPair ? langPair.split('-') : ['', ''];

                    try {
                        const response = await TerminologyAPI.list({
                            keyword: keyword || undefined,
                            sourceLanguage: sourceLanguage || undefined,
                            targetLanguage: targetLanguage || undefined,
                            page: currentPage,
                            size: pageSize
                        });

                        const data = response.data || [];
                        totalPages = response.totalPages || 0;
                        totalElements = response.totalElements || 0;

                        const tbody = $('.terminology-table tbody');
                        if (data.length === 0) {
                            tbody.html('<tr><td colspan="6" class="text-center text-muted">暂无数据</td></tr>');
                        } else {
                            tbody.html(data.map(item => `
                                <tr>
                                    <td>${escapeHtml(item.sourceTerm || '')}</td>
                                    <td>${escapeHtml(item.targetTerm || '')}</td>
                                    <td>${escapeHtml((item.sourceLanguage || '') + ' → ' + (item.targetLanguage || ''))}</td>
                                    <td>${escapeHtml(item.domain || '')}</td>
                                    <td>${formatDate(item.createdAt)}</td>
                                    <td class="action-buttons">
                                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editTerminology(${item.id})">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteTerminology(${item.id})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            `).join(''));
                        }

                        updatePagination();
                    } catch (error) {
                        console.error('加载术语列表失败:', error);
                        Utils.showToast('加载术语列表失败: ' + (error.message || '服务器错误'), 'danger');
                        $('.terminology-table tbody').html('<tr><td colspan="6" class="text-center text-danger">加载失败</td></tr>');
                    }
                }

                // 更新分页
                function updatePagination() {
                    const pagination = $('.pagination');
                    pagination.empty();

                    // 上一页
                    pagination.append(`
                        <li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                            <a class="page-link" href="#" onclick="changePage(${currentPage - 1}); return false;">上一页</a>
                        </li>
                    `);

                    // 页码
                    for (let i = 0; i < totalPages; i++) {
                        pagination.append(`
                            <li class="page-item ${i === currentPage ? 'active' : ''}">
                                <a class="page-link" href="#" onclick="changePage(${i}); return false;">${i + 1}</a>
                            </li>
                        `);
                    }

                    // 下一页
                    pagination.append(`
                        <li class="page-item ${currentPage >= totalPages - 1 ? 'disabled' : ''}">
                            <a class="page-link" href="#" onclick="changePage(${currentPage + 1}); return false;">下一页</a>
                        </li>
                    `);
                }

                // 切换页码
                window.changePage = function(page) {
                    if (page < 0 || page >= totalPages) return;
                    currentPage = page;
                    loadTerminologyList();
                };

                // 编辑术语
                window.editTerminology = function(id) {
                    // TODO: 实现编辑功能
                    Utils.showToast('编辑功能待实现', 'info');
                };

                // 删除术语
                window.deleteTerminology = async function(id) {
                    if (!confirm('确定要删除这条术语吗？')) return;
                    try {
                        await TerminologyAPI.remove(id);
                        Utils.showToast('删除成功', 'success');
                        loadTerminologyList();
                    } catch (error) {
                        console.error('删除失败:', error);
                        Utils.showToast('删除失败: ' + (error.message || '服务器错误'), 'danger');
                    }
                };

                // 工具函数
                function escapeHtml(text) {
                    if (typeof text !== 'string') return String(text || '');
                    const map = {
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        '"': '&quot;',
                        "'": '&#039;'
                    };
                    return text.replace(/[&<>"']/g, m => map[m]);
                }

                function formatDate(dateStr) {
                    if (!dateStr) return '';
                    try {
                        const date = new Date(dateStr);
                        return date.toLocaleDateString('zh-CN');
                    } catch (e) {
                        return dateStr;
                    }
                }

                // 搜索按钮事件
                $('.search-box button:contains("搜索")').on('click', function() {
                    currentPage = 0;
                    loadTerminologyList();
                });

                // 重置按钮事件
                $('.search-box button:contains("重置")').on('click', function() {
                    $('.search-box input').val('');
                    $('.search-box select').val('');
                    currentPage = 0;
                    loadTerminologyList();
                });

                // 模态框事件
                $('#addTerminologyModal').on('shown.bs.modal', function () {
                    $(this).find('input:first').focus();
                });

                // 保存术语
                $('#addTerminologyModal .btn-primary').on('click', async function() {
                    const form = $('#addTerminologyModal form');
                    const sourceTerm = form.find('input[placeholder="输入源术语"]').val();
                    const targetTerm = form.find('input[placeholder="输入目标术语"]').val();
                    const sourceLang = form.find('select').eq(0).val();
                    const targetLang = form.find('select').eq(1).val();
                    const domain = form.find('input[placeholder*="领域"]').val();

                    if (!sourceTerm || !targetTerm) {
                        Utils.showToast('请填写源术语和目标术语', 'warning');
                        return;
                    }

                    try {
                        await TerminologyAPI.create({
                            sourceTerm: sourceTerm,
                            targetTerm: targetTerm,
                            sourceLanguage: sourceLang,
                            targetLanguage: targetLang,
                            domain: domain || undefined
                        });
                        Utils.showToast('添加成功', 'success');
                        bootstrap.Modal.getInstance($('#addTerminologyModal')).hide();
                        form[0].reset();
                        loadTerminologyList();
                    } catch (error) {
                        console.error('添加失败:', error);
                        Utils.showToast('添加失败: ' + (error.message || '服务器错误'), 'danger');
                    }
                });

                // 初始化加载
                loadTerminologyList();
            });
        </script>
    </th:block>
</body>
</html>
