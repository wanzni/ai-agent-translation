<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::page-styles}, ~{::page-scripts})}">
<head>
    <title>个人资料</title>
    <th:block th:fragment="page-styles">
        <style>
            .profile-container {
                max-width: 900px;
                margin: 0 auto;
            }

            .profile-card {
                background: white;
                border-radius: 0.75rem;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
                overflow: hidden;
                margin-bottom: 1.5rem;
            }

            .profile-header {
                background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
                color: white;
                padding: 1.5rem;
            }

            .avatar-section {
                text-align: center;
                padding: 2rem;
                background: #f8fafc;
                border-bottom: 1px solid #e2e8f0;
            }

            .avatar {
                width: 120px;
                height: 120px;
                border-radius: 50%;
                object-fit: cover;
                border: 4px solid white;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                margin: 0 auto 1rem;
            }

            .profile-section {
                padding: 1.5rem;
                border-bottom: 1px solid #e2e8f0;
            }

            .profile-section:last-child {
                border-bottom: none;
            }

            .profile-label {
                font-weight: 500;
                margin-bottom: 0.5rem;
                color: #334155;
            }

            .profile-value {
                margin-bottom: 1rem;
                padding: 0.75rem;
                background: #f1f5f9;
                border-radius: 0.375rem;
                min-height: 48px;
            }

            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 1rem;
                margin-top: 1rem;
            }

            .stat-card {
                background: #f8fafc;
                border-radius: 0.5rem;
                padding: 1rem;
                text-align: center;
            }

            .stat-number {
                font-size: 1.5rem;
                font-weight: bold;
                color: #2563eb;
            }

            .stat-label {
                font-size: 0.875rem;
                color: #64748b;
            }
        </style>
    </th:block>
</head>
<body>
<div th:fragment="content">
    <div class="profile-container">
        <div id="profileAlert" class="alert alert-info d-none"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0">个人资料</h1>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-secondary" href="/">返回工作台</a>
                <a class="btn btn-outline-primary" href="/orders">我的订单</a>
            </div>
        </div>

        <div class="profile-card">
            <div class="profile-header">
                <h2 class="h4 mb-0">基本信息</h2>
            </div>

            <div class="avatar-section">
                <img id="profileAvatar" src="/img/avatar.png" alt="用户头像" class="avatar">
                <h3 id="profileDisplayName">当前用户</h3>
                <p class="text-muted mb-0" id="profileRoleText">普通用户</p>
            </div>

            <div class="profile-section">
                <div class="row">
                    <div class="col-md-6">
                        <div class="profile-label">用户名</div>
                        <div class="profile-value" id="usernameDisplay">-</div>
                    </div>
                    <div class="col-md-6">
                        <div class="profile-label">邮箱</div>
                        <div class="profile-value" id="emailDisplay">-</div>
                    </div>
                    <div class="col-md-6">
                        <div class="profile-label">昵称</div>
                        <div class="profile-value" id="nameDisplay">-</div>
                    </div>
                    <div class="col-md-6">
                        <div class="profile-label">手机号</div>
                        <div class="profile-value" id="phoneDisplay">-</div>
                    </div>
                    <div class="col-md-6">
                        <div class="profile-label">注册时间</div>
                        <div class="profile-value" id="registerDateDisplay">-</div>
                    </div>
                    <div class="col-md-6">
                        <div class="profile-label">最近登录</div>
                        <div class="profile-value" id="lastLoginDisplay">-</div>
                    </div>
                </div>
            </div>

            <div class="profile-section">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="mb-1">资料编辑说明</h4>
                        <p class="text-muted mb-0">当前仓库已接入资料读取能力，但资料修改接口暂未开放。</p>
                    </div>
                    <button class="btn btn-outline-primary" id="editProfileBtn">编辑资料</button>
                </div>
            </div>

            <div class="profile-section">
                <h4 class="mb-3">账户状态</h4>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="profileMembershipType">--</div>
                        <div class="stat-label">会员状态</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="profileRemainingQuota">--</div>
                        <div class="stat-label">剩余配额</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="profilePointsBalance">--</div>
                        <div class="stat-label">点数余额</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="profileMembershipExpire">--</div>
                        <div class="stat-label">会员到期</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="profile-card">
            <div class="profile-header">
                <h2 class="h4 mb-0">安全设置</h2>
            </div>
            <div class="profile-section">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h5 class="mb-1">修改密码</h5>
                        <p class="text-muted mb-0">当前页面已接入登录态与资料读取，密码修改接口尚未接入。</p>
                    </div>
                    <button class="btn btn-outline-primary" id="changePasswordBtn">修改密码</button>
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1">两步验证</h5>
                        <p class="text-muted mb-0">当前仓库暂未提供两步验证后端能力。</p>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="twoFactorAuth" disabled>
                        <label class="form-check-label" for="twoFactorAuth">未接入</label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="page-scripts">
    <script>
        (function () {
            function authFetch(url, options) {
                return window.authorizedFetch ? window.authorizedFetch(url, options) : fetch(url, options);
            }

            function unwrapApiPayload(payload) {
                if (payload && typeof payload === 'object' && Object.prototype.hasOwnProperty.call(payload, 'data')) {
                    return payload.data;
                }
                return payload;
            }

            function formatDateTime(value) {
                if (!value) return '-';
                const date = typeof value === 'string' ? new Date(value.replace('T', ' ')) : new Date(value);
                if (Number.isNaN(date.getTime())) return '-';
                const pad = num => String(num).padStart(2, '0');
                return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
            }

            function showAlert(message, type) {
                const alertEl = document.getElementById('profileAlert');
                alertEl.className = `alert alert-${type}`;
                alertEl.textContent = message;
                alertEl.classList.remove('d-none');
            }

            function fill(id, value) {
                const el = document.getElementById(id);
                if (el) {
                    el.textContent = value == null || value === '' ? '-' : value;
                }
            }

            async function loadCurrentUser() {
                const resp = await authFetch('/api/users/me', { authPromptOn401: true });
                if (!resp.ok) {
                    throw new Error('load current user failed');
                }
                return unwrapApiPayload(await resp.json());
            }

            async function loadMembership() {
                const resp = await authFetch('/api/membership/current', { authPromptOn401: false });
                if (!resp.ok) return null;
                return unwrapApiPayload(await resp.json());
            }

            async function loadPointsBalance() {
                const resp = await authFetch('/api/points/balance', { authPromptOn401: false });
                if (!resp.ok) return null;
                const payload = unwrapApiPayload(await resp.json());
                return payload && payload.balance != null ? payload.balance : null;
            }

            async function renderProfile() {
                try {
                    const [user, membership, balance] = await Promise.all([
                        loadCurrentUser(),
                        loadMembership(),
                        loadPointsBalance()
                    ]);

                    const displayName = user.nickname || user.username || '当前用户';
                    const roleText = user.role || 'USER';
                    fill('usernameDisplay', user.username);
                    fill('emailDisplay', user.email);
                    fill('nameDisplay', user.nickname || user.username);
                    fill('phoneDisplay', user.phone);
                    fill('registerDateDisplay', formatDateTime(user.createdAt));
                    fill('lastLoginDisplay', formatDateTime(user.lastLoginTime));
                    fill('profileDisplayName', displayName);
                    fill('profileRoleText', roleText);

                    const avatarEl = document.getElementById('profileAvatar');
                    const avatarUrl = user.avatarUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&size=120&background=2563eb&color=ffffff`;
                    avatarEl.src = avatarUrl;
                    avatarEl.onerror = () => {
                        avatarEl.onerror = null;
                        avatarEl.src = '/img/avatar.png';
                    };

                    if (membership && membership.active) {
                        fill('profileMembershipType', membership.typeDesc || membership.type || '会员');
                        fill('profileRemainingQuota', membership.remainingQuota);
                        fill('profileMembershipExpire', formatDateTime(membership.endAt));
                    } else {
                        fill('profileMembershipType', '未开通');
                        fill('profileRemainingQuota', 0);
                        fill('profileMembershipExpire', '-');
                    }
                    fill('profilePointsBalance', balance != null ? balance : '--');
                } catch (e) {
                    showAlert('加载个人资料失败，请先确认登录状态。', 'warning');
                }
            }

            function showUnavailableMessage(message) {
                if (typeof Utils !== 'undefined' && Utils.showToast) {
                    Utils.showToast(message, 'info');
                } else {
                    alert(message);
                }
            }

            document.addEventListener('DOMContentLoaded', () => {
                const boot = window.ensureAuthHydrated ? window.ensureAuthHydrated() : Promise.resolve();
                Promise.resolve(boot).finally(() => renderProfile());
                document.getElementById('editProfileBtn').addEventListener('click', () => {
                    showUnavailableMessage('当前仓库暂未提供资料修改接口，已先接入真实资料读取。');
                });
                document.getElementById('changePasswordBtn').addEventListener('click', () => {
                    showUnavailableMessage('当前仓库暂未提供密码修改接口。');
                });
                window.addEventListener('auth-state-changed', renderProfile);
            });
        })();
    </script>
</th:block>
</body>
</html>
