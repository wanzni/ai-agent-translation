<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::page-styles}, ~{::page-scripts})}">
<head>
    <title>我的订单</title>
    <th:block th:fragment="page-styles">
        <style>
            .orders-container { max-width: 1200px; margin: 0 auto; }
            .order-status-badge { font-size: 0.85rem; }
            .table thead th { white-space: nowrap; }
            .order-actions { flex-wrap: nowrap; }
            .order-actions .btn { white-space: nowrap; }
        </style>
    </th:block>
</head>
<body>
<div th:fragment="content">
    <div class="orders-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0">我的订单</h1>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-secondary" href="/">返回工作台</a>
                <a class="btn btn-primary" href="/membership">开通会员</a>
            </div>
        </div>

        <div id="ordersAlert" class="alert alert-info d-none"></div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="ordersTable">
                        <thead>
                        <tr>
                            <th>订单号</th>
                            <th>会员类型</th>
                            <th>时长(月)</th>
                            <th>金额</th>
                            <th>订单状态</th>
                            <th>支付状态</th>
                            <th>创建时间</th>
                            <th>支付截止</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="page-scripts">
    <script>
        (function () {
            function getAuthUser() {
                try {
                    return JSON.parse(localStorage.getItem('authUser') || 'null');
                } catch (_) {
                    return null;
                }
            }

            function authFetch(url, options) {
                return window.authorizedFetch ? window.authorizedFetch(url, options) : fetch(url, options);
            }

            function unwrapApiPayload(payload) {
                if (payload && typeof payload === 'object' && Object.prototype.hasOwnProperty.call(payload, 'data')) {
                    return payload.data;
                }
                return payload;
            }

            function typeToZh(type) {
                switch (String(type || '').toUpperCase()) {
                    case 'MONTHLY': return '包月会员';
                    case 'QUARTERLY': return '包季会员';
                    case 'YEARLY': return '包年会员';
                    default: return '未知类型';
                }
            }

            function statusToZh(status) {
                switch (String(status || '').toUpperCase()) {
                    case 'PENDING': return '待支付';
                    case 'PAID': return '已完成';
                    case 'CANCELLED': return '已取消';
                    case 'REFUNDED': return '已退款';
                    default: return '未知状态';
                }
            }

            function payStatusToZh(status, expired) {
                const value = String(status || '').toUpperCase();
                if (value === 'PAID') return '已支付';
                if (value === 'PENDING') return expired ? '已过期' : '待支付';
                if (value === 'CANCELLED') return '已取消';
                if (value === 'REFUNDED') return '已退款';
                return '未知状态';
            }

            function formatDateTime(value) {
                if (!value) return '-';
                const date = typeof value === 'string' ? new Date(value.replace('T', ' ')) : new Date(value);
                if (Number.isNaN(date.getTime())) return '-';
                const pad = num => String(num).padStart(2, '0');
                return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
            }

            function isExpired(expiresAt) {
                if (!expiresAt) return false;
                const date = new Date(typeof expiresAt === 'string' ? expiresAt.replace('T', ' ') : expiresAt);
                return !Number.isNaN(date.getTime()) && Date.now() > date.getTime();
            }

            function showAlert(message, type) {
                const alertEl = document.getElementById('ordersAlert');
                alertEl.className = `alert alert-${type}`;
                alertEl.textContent = message;
                alertEl.classList.remove('d-none');
            }

            function hideAlert() {
                document.getElementById('ordersAlert').classList.add('d-none');
            }

            function renderOrders(list) {
                const tbody = document.querySelector('#ordersTable tbody');
                tbody.innerHTML = '';
                if (!Array.isArray(list) || list.length === 0) {
                    showAlert('当前没有会员订单，可以前往会员中心创建订单。', 'info');
                    return;
                }
                hideAlert();
                list.forEach(order => {
                    const expired = isExpired(order.expiresAt);
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><a href="/orders/${order.orderNo}">${order.orderNo}</a></td>
                        <td>${typeToZh(order.type)}</td>
                        <td>${order.months ?? '-'}</td>
                        <td>${order.amount ?? '-'} ${order.currency || 'CNY'}</td>
                        <td><span class="badge ${order.status === 'PENDING' ? 'bg-warning text-dark' : (order.status === 'PAID' ? 'bg-success' : 'bg-secondary')} order-status-badge">${statusToZh(order.status)}</span></td>
                        <td><span class="badge ${order.status === 'PAID' ? 'bg-success' : (order.status === 'PENDING' ? (expired ? 'bg-secondary' : 'bg-warning text-dark') : 'bg-secondary')} order-status-badge">${payStatusToZh(order.status, expired)}</span></td>
                        <td>${formatDateTime(order.createdAt)}</td>
                        <td>${formatDateTime(order.expiresAt)}</td>
                        <td class="d-flex gap-2 order-actions">
                            <a class="btn btn-sm btn-outline-primary" href="/orders/${order.orderNo}">订单详情</a>
                            ${order.status === 'PENDING' && !expired ? `<a class="btn btn-sm btn-primary" href="/membership/pay?orderNo=${order.orderNo}">继续支付</a>` : ''}
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            async function loadOrders() {
                const user = getAuthUser();
                if (!user || user.id == null) {
                    showAlert('请先登录后查看订单列表。', 'warning');
                    return;
                }
                try {
                    const resp = await authFetch('/api/membership/orders', { authPromptOn401: true });
                    if (!resp.ok) {
                        throw new Error('load orders failed');
                    }
                    const payload = await resp.json();
                    const result = unwrapApiPayload(payload);
                    const list = Array.isArray(result && result.data) ? result.data : (Array.isArray(result) ? result : []);
                    renderOrders(list);
                } catch (e) {
                    showAlert('加载订单失败，请稍后重试。', 'danger');
                }
            }

            document.addEventListener('DOMContentLoaded', () => {
                const boot = window.ensureAuthHydrated ? window.ensureAuthHydrated() : Promise.resolve();
                Promise.resolve(boot).finally(() => loadOrders());
            });
            window.addEventListener('auth-state-changed', loadOrders);
        })();
    </script>
</th:block>
</body>
</html>
