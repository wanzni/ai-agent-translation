<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::page-styles}, ~{::page-scripts})}">
<head>
    <title>会员支付</title>
    <th:block th:fragment="page-styles">
        <style>
            .pay-option { cursor: pointer; }
            .pay-option.active { border: 2px solid #0d6efd; }
            .qr-pane { display: none; }
            .qr-pane.show { display: block; }
            #qrCode { width: 220px; height: 220px; margin: 0 auto; }
        </style>
    </th:block>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
<th:block th:fragment="content">
    <div class="container py-4">
        <div class="row mb-3">
            <div class="col-12">
                <h2 class="fw-bold"><i class="fas fa-wallet me-2"></i>会员支付</h2>
                <p class="text-muted">请选择一种支付方式完成会员订单。</p>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-3">
                    <div class="card-body">
                        <h5 class="card-title">订单信息</h5>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item">订单号：<span id="orderNo">-</span></li>
                            <li class="list-group-item">会员类型：<span id="type">-</span></li>
                            <li class="list-group-item">价格：<span id="amount">-</span> <span id="currency">CNY</span></li>
                            <li class="list-group-item">总额度：<span id="periodQuota">-</span> 点</li>
                            <li class="list-group-item">支付状态：<span id="orderStatus">-</span></li>
                            <li class="list-group-item">剩余支付时间：<span id="countdown">--:--</span></li>
                        </ul>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">选择支付方式</h5>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <div class="card pay-option" data-provider="ALIPAY" data-method="ALIPAY_QR">
                                    <div class="card-body text-center">
                                        <i class="fab fa-alipay fa-2x text-primary mb-2"></i>
                                        <div>支付宝扫码</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card pay-option" data-provider="WECHAT" data-method="WECHAT_QR">
                                    <div class="card-body text-center">
                                        <i class="fab fa-weixin fa-2x text-success mb-2"></i>
                                        <div>微信扫码</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card pay-option" data-provider="UNIONPAY" data-method="UNIONPAY_QR">
                                    <div class="card-body text-center">
                                        <i class="fas fa-qrcode fa-2x text-danger mb-2"></i>
                                        <div>云闪付扫码</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card pay-option" data-provider="OTHER" data-method="CREDIT_CARD">
                                    <div class="card-body text-center">
                                        <i class="far fa-credit-card fa-2x text-secondary mb-2"></i>
                                        <div>银行卡</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid mt-3">
                            <button id="payBtn" class="btn btn-primary" disabled>立即支付</button>
                            <div id="payStatus" class="alert d-none mt-2" role="alert"></div>
                            <div id="qrPane" class="qr-pane mt-3">
                                <div class="card">
                                    <div class="card-body text-center">
                                        <h6 class="card-title mb-2">扫码支付</h6>
                                        <div id="qrCode"></div>
                                        <div class="small text-muted mt-2">请使用对应支付 App 扫码完成支付。</div>
                                        <div class="mt-3 d-flex justify-content-center gap-2">
                                            <button id="confirmBtn" class="btn btn-success btn-sm" disabled>我已完成支付</button>
                                            <button id="refreshBtn" class="btn btn-outline-secondary btn-sm">刷新订单状态</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">支付须知</h5>
                        <ul class="list-unstyled mb-0 text-muted">
                            <li class="mb-2">支付成功后自动开通会员并跳转到成功页。</li>
                            <li class="mb-2">订单超时后将无法继续支付，请返回会员页重新下单。</li>
                            <li>如支付状态未刷新，可点击“刷新订单状态”或“我已完成支付”。</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="page-scripts">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const orderNo = (params.get('orderNo') || '').trim();
            const payBtn = document.getElementById('payBtn');
            const statusEl = document.getElementById('payStatus');
            const countdownEl = document.getElementById('countdown');
            const qrPane = document.getElementById('qrPane');
            const qrCodeEl = document.getElementById('qrCode');
            const confirmBtn = document.getElementById('confirmBtn');
            const refreshBtn = document.getElementById('refreshBtn');

            let selected = null;
            let currentOrder = null;
            let currentPaymentNo = null;
            let countdownTimer = null;
            let pollTimer = null;

            function authFetch(url, options) {
                return window.authorizedFetch ? window.authorizedFetch(url, options) : fetch(url, options);
            }

            function unwrapApiPayload(payload) {
                if (payload && typeof payload === 'object' && Object.prototype.hasOwnProperty.call(payload, 'data')) {
                    return payload.data;
                }
                return payload;
            }

            function typeToZh(type) {
                switch (String(type || '').toUpperCase()) {
                    case 'MONTHLY': return '包月会员';
                    case 'QUARTERLY': return '包季会员';
                    case 'YEARLY': return '包年会员';
                    default: return '未知类型';
                }
            }

            function statusToZh(status, expired) {
                const value = String(status || '').toUpperCase();
                if (value === 'PAID') return '已支付';
                if (value === 'PENDING') return expired ? '已过期' : '待支付';
                if (value === 'CANCELLED') return '已取消';
                if (value === 'REFUNDED') return '已退款';
                return '未知状态';
            }

            function fill(id, value) {
                const el = document.getElementById(id);
                if (el) {
                    el.textContent = value == null || value === '' ? '-' : value;
                }
            }

            function showStatus(message, type) {
                statusEl.className = `alert alert-${type} mt-2`;
                statusEl.textContent = message;
                statusEl.classList.remove('d-none');
            }

            function hideStatus() {
                statusEl.classList.add('d-none');
            }

            function isExpired(expiresAt) {
                if (!expiresAt) return false;
                const date = new Date(typeof expiresAt === 'string' ? expiresAt.replace('T', ' ') : expiresAt);
                return !Number.isNaN(date.getTime()) && Date.now() > date.getTime();
            }

            function stopCountdown() {
                if (countdownTimer) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                }
            }

            function startCountdown(expiresAt) {
                stopCountdown();
                if (!expiresAt) {
                    countdownEl.textContent = '--:--';
                    return;
                }
                const target = new Date(typeof expiresAt === 'string' ? expiresAt.replace('T', ' ') : expiresAt).getTime();
                if (Number.isNaN(target)) {
                    countdownEl.textContent = '--:--';
                    return;
                }
                const tick = () => {
                    const remainSeconds = Math.floor((target - Date.now()) / 1000);
                    if (remainSeconds <= 0) {
                        countdownEl.textContent = '00:00';
                        stopCountdown();
                        payBtn.disabled = true;
                        return;
                    }
                    const minutes = Math.floor(remainSeconds / 60);
                    const seconds = remainSeconds % 60;
                    countdownEl.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                };
                tick();
                countdownTimer = setInterval(tick, 1000);
            }

            function hideQr() {
                qrPane.classList.remove('show');
                qrCodeEl.innerHTML = '';
                currentPaymentNo = null;
                confirmBtn.disabled = !selected;
            }

            function showQr(codeUrl) {
                hideQr();
                qrPane.classList.add('show');
                new QRCode(qrCodeEl, {
                    text: codeUrl,
                    width: 220,
                    height: 220
                });
                confirmBtn.disabled = false;
            }

            function redirectToSuccess(data) {
                const query = new URLSearchParams({
                    orderNo: String(data.orderNo || orderNo || ''),
                    userId: String(data.userId || ''),
                    type: String(data.type || ''),
                    periodQuota: String(data.periodQuota || ''),
                    startAt: String(data.startAt || ''),
                    endAt: String(data.endAt || ''),
                    amount: String(data.amount || ''),
                    paidAt: String(data.paidAt || '')
                });
                window.location.assign(`/membership/success?${query.toString()}`);
            }

            function renderOrder(order) {
                currentOrder = order;
                const expired = isExpired(order.expiresAt);
                fill('orderNo', order.orderNo || orderNo);
                fill('type', typeToZh(order.type));
                fill('amount', order.amount);
                fill('currency', order.currency || 'CNY');
                fill('periodQuota', order.periodQuota);
                fill('orderStatus', statusToZh(order.status, expired));
                startCountdown(order.expiresAt);

                    if (String(order.status || '').toUpperCase() !== 'PENDING' || expired) {
                        payBtn.disabled = true;
                        hideQr();
                        confirmBtn.disabled = true;
                    } else {
                        payBtn.disabled = !selected;
                        confirmBtn.disabled = !selected;
                    }
                }

            async function loadOrder() {
                if (!orderNo) {
                    showStatus('缺少订单号，无法进入支付页。', 'warning');
                    payBtn.disabled = true;
                    return;
                }
                try {
                    const resp = await authFetch(`/api/membership/order/${encodeURIComponent(orderNo)}`, { authPromptOn401: false });
                    if (!resp.ok) {
                        throw new Error('load order failed');
                    }
                    const order = unwrapApiPayload(await resp.json());
                    renderOrder(order);
                    if (String(order.status || '').toUpperCase() === 'PAID') {
                        showStatus('订单已支付，正在为你跳转到成功页。', 'success');
                        stopPolling();
                        setTimeout(() => redirectToSuccess(order), 500);
                    } else {
                        hideStatus();
                    }
                } catch (e) {
                    showStatus('加载订单信息失败，请返回订单列表重试。', 'danger');
                }
            }

            function stopPolling() {
                if (pollTimer) {
                    clearInterval(pollTimer);
                    pollTimer = null;
                }
            }

            function startPolling() {
                stopPolling();
                pollTimer = setInterval(async () => {
                    if (!currentOrder) return;
                    try {
                        const resp = await authFetch(`/api/membership/order/${encodeURIComponent(orderNo)}`, { authPromptOn401: false });
                        if (!resp.ok) return;
                        const order = unwrapApiPayload(await resp.json());
                        renderOrder(order);
                        if (String(order.status || '').toUpperCase() === 'PAID') {
                            stopPolling();
                            showStatus('支付成功，正在跳转到成功页。', 'success');
                            setTimeout(() => redirectToSuccess(order), 500);
                        }
                    } catch (_) {
                        // ignore polling failure
                    }
                }, 3000);
            }

            function bindOptions() {
                document.querySelectorAll('.pay-option').forEach(card => {
                    card.addEventListener('click', () => {
                        document.querySelectorAll('.pay-option').forEach(item => item.classList.remove('active'));
                        card.classList.add('active');
                        selected = { provider: card.dataset.provider, method: card.dataset.method };
                        if (currentOrder && String(currentOrder.status || '').toUpperCase() === 'PENDING' && !isExpired(currentOrder.expiresAt)) {
                            payBtn.disabled = false;
                            confirmBtn.disabled = false;
                        }
                        hideQr();
                    });
                });
            }

            async function doPay() {
                if (!selected || !currentOrder) return;
                if (String(currentOrder.status || '').toUpperCase() !== 'PENDING' || isExpired(currentOrder.expiresAt)) {
                    showStatus('当前订单已过期或不可支付，请返回会员页重新下单。', 'warning');
                    return;
                }

                showStatus('正在发起支付，请稍候...', 'info');
                try {
                    if ((selected.method || '').endsWith('_QR')) {
                        const resp = await authFetch('/api/payment/prepay', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Accept': 'application/json'
                            },
                            body: JSON.stringify({
                                orderNo: currentOrder.orderNo,
                                provider: selected.provider,
                                method: selected.method
                            }),
                            authPromptOn401: false
                        });
                        const payload = unwrapApiPayload(await resp.json());
                        if (!resp.ok || !payload || !payload.codeUrl) {
                            throw new Error('prepay failed');
                        }
                        currentPaymentNo = payload.paymentNo || null;
                        showQr(payload.codeUrl);
                        showStatus('二维码已生成，请扫码完成支付。', 'info');
                        startPolling();
                        return;
                    }

                    const resp = await authFetch('/api/payment/pay', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({
                            orderNo: currentOrder.orderNo,
                            provider: selected.provider,
                            method: selected.method
                        }),
                        authPromptOn401: false
                    });
                    const payload = unwrapApiPayload(await resp.json());
                    if (!resp.ok) {
                        throw new Error('pay failed');
                    }
                    showStatus('支付成功，正在跳转到成功页。', 'success');
                    setTimeout(() => redirectToSuccess(payload), 500);
                } catch (e) {
                    showStatus('支付失败，请稍后重试。', 'danger');
                }
            }

            async function confirmPayment() {
                if (!selected || !currentOrder) {
                    showStatus('请先选择支付方式。', 'warning');
                    return;
                }
                if (String(currentOrder.status || '').toUpperCase() !== 'PENDING' || isExpired(currentOrder.expiresAt)) {
                    showStatus('当前订单已过期或不可支付，请返回会员页重新下单。', 'warning');
                    return;
                }

                if (!currentPaymentNo) {
                    showStatus('未生成支付二维码，按模拟支付直接完成订单。', 'info');
                    try {
                        const resp = await authFetch('/api/payment/pay', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Accept': 'application/json'
                            },
                            body: JSON.stringify({
                                orderNo: currentOrder.orderNo,
                                provider: selected.provider,
                                method: selected.method
                            }),
                            authPromptOn401: false
                        });
                        const payload = unwrapApiPayload(await resp.json());
                        if (!resp.ok) {
                            throw new Error('mock pay failed');
                        }
                        stopPolling();
                        showStatus('支付成功，正在跳转到成功页。', 'success');
                        setTimeout(() => redirectToSuccess(payload), 500);
                        return;
                    } catch (e) {
                        showStatus('模拟支付失败，请稍后重试。', 'danger');
                        return;
                    }
                }

                showStatus('正在确认支付结果...', 'info');
                try {
                    const resp = await authFetch('/api/payment/confirm', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ paymentNo: currentPaymentNo }),
                        authPromptOn401: false
                    });
                    const payload = unwrapApiPayload(await resp.json());
                    if (!resp.ok) {
                        throw new Error('confirm failed');
                    }
                    stopPolling();
                    showStatus('支付成功，正在跳转到成功页。', 'success');
                    setTimeout(() => redirectToSuccess(payload), 500);
                } catch (e) {
                    showStatus('确认支付失败，请稍后再试。', 'danger');
                }
            }

            document.addEventListener('DOMContentLoaded', () => {
                bindOptions();
                loadOrder();
                payBtn.addEventListener('click', doPay);
                confirmBtn.addEventListener('click', confirmPayment);
                refreshBtn.addEventListener('click', loadOrder);
            });
        })();
    </script>
</th:block>
</body>
</html>
